<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>瓦片源延迟测试</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'Microsoft YaHei', sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 16px; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .subtitle { color: #888; font-size: 13px; margin-bottom: 16px; }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 12px; }
  .card { background: #16213e; border-radius: 10px; overflow: hidden; border: 1px solid #0f3460; }
  .card.running { border-color: #e94560; }
  .card.ok { border-color: #00b894; }
  .card.slow { border-color: #fdcb6e; }
  .card.fail { border-color: #d63031; }

  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; background: #0f3460; }
  .card-header h3 { font-size: 13px; font-weight: 600; }
  .card-header .url { font-size: 10px; color: #8899aa; word-break: break-all; margin-top: 2px; }

  .metrics { display: flex; gap: 16px; padding: 8px 12px; font-size: 11px; background: rgba(0,0,0,.2); }
  .metric { text-align: center; }
  .metric .value { font-size: 16px; font-weight: 700; }
  .metric .label { color: #8899aa; font-size: 10px; }
  .metric .value.good { color: #00b894; }
  .metric .value.warn { color: #fdcb6e; }
  .metric .value.bad { color: #d63031; }

  .map-preview { width: 100%; height: 200px; background: #0a0a1a; position: relative; }
  .map-preview .overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1000; pointer-events: none; }
  .map-preview .overlay .status { background: rgba(0,0,0,.8); padding: 6px 16px; border-radius: 20px; font-size: 12px; }

  .controls { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  button { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
  .btn-run { background: #e94560; color: #fff; }
  .btn-run:hover { background: #c23152; }
  .btn-run:disabled { opacity: .5; cursor: not-allowed; }
  .btn-stop { background: #636e72; color: #fff; }

  select { padding: 6px 10px; border-radius: 6px; border: 1px solid #0f3460; background: #16213e; color: #e0e0e0; font-size: 13px; }
  label { font-size: 12px; color: #8899aa; }

  .summary { margin-top: 16px; padding: 12px; background: #16213e; border-radius: 8px; font-size: 12px; line-height: 1.8; }
  .summary strong { color: #e94560; }
</style>
</head>
<body>

<h1>🗺️ 瓦片源延迟测试</h1>
<p class="subtitle">
  每个源加载 25 张瓦片（z=13~17, 苏州区域），统计延迟和成功率。
  <br>测试页面位于 backend 运行时可通过 <code>/tile-test.html</code> 访问，或直接浏览器打开本文件。
</p>

<div class="controls">
  <button class="btn-run" id="btnRun" onclick="runAll()">▶ 开始测试</button>
  <button class="btn-stop" id="btnStop" onclick="stopAll()" style="display:none">⏹ 停止</button>
  <label style="margin-left:12px">瓦片数:</label>
  <select id="tileCount">
    <option value="16">16 (快速)</option>
    <option value="36" selected>36 (标准)</option>
    <option value="64">64 (深度)</option>
  </select>
  <label>缩放级别:</label>
  <select id="zoomRange">
    <option value="12-15" selected>12-15 (区域)</option>
    <option value="13-16">13-16 (街道)</option>
    <option value="10-13">10-13 (城市)</option>
  </select>
</div>

<div class="grid" id="grid"></div>

<div class="summary" id="summary" style="display:none"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ── 测试瓦片源列表 ──────────────────────────────
const SOURCES = [
  {
    id: 'osm-official',
    name: 'OSM 官方 (GeoDNS→可能路由到莫斯科)',
    url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    subdomains: 'abc',
    maxZoom: 19,
    note: 'GeoDNS 可能把中国请求路由到莫斯科 Yandex 节点'
  },
  {
    id: 'osm-fr',
    name: 'OSM 法国镜像 (当前回退源)',
    url: 'https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png',
    subdomains: 'abc',
    maxZoom: 20,
    note: '你 tileDetector.ts 当前的回退源'
  },
  {
    id: 'osm-fr-hot',
    name: 'OSM 法国 Humanitarian',
    url: 'https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png',
    subdomains: 'abc',
    maxZoom: 20,
    note: '人道主义 OSM 风格，独立服务器'
  },
  {
    id: 'osm-de',
    name: 'OSM 德国镜像 (FOSSGIS)',
    url: 'https://{s}.tile.openstreetmap.de/tiles/osmde/{z}/{x}/{y}.png',
    subdomains: 'abc',
    maxZoom: 18,
    note: '德国 FOSSGIS 维护'
  },
  {
    id: 'amap-vec',
    name: '高德矢量 (国内基准)',
    url: 'https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',
    subdomains: '1234',
    maxZoom: 18,
    note: 'GCJ-02 坐标系，作国内速度基准'
  },
  {
    id: 'tianditu-vec',
    name: '天地图矢量 (国内基准)',
    url: 'http://t{s}.tianditu.gov.cn/vec_c/wmts?service=WMTS&request=GetTile&version=1.0.0&layer=vec&style=default&format=tiles&tileMatrixSet=c&tileMatrix={z}&tileRow={y}&tileCol={x}',
    subdomains: '01234567',
    maxZoom: 18,
    note: 'CGCS2000 ≈ WGS84，无需坐标转换'
  },
]

// 苏州中心坐标 + 周边瓦片范围
const CENTER = { lat: 31.2990, lng: 120.5853 }
let abortControllers = []
let maps = []

function stopAll() {
  abortControllers.forEach(c => c.abort())
  abortControllers = []
  document.getElementById('btnStop').style.display = 'none'
  document.getElementById('btnRun').disabled = false
}

function buildTileList(zoomRange) {
  const [zMin, zMax] = zoomRange.split('-').map(Number)
  const tiles = []
  // 用苏州中心的经纬度算出对应瓦片坐标
  const latRad = CENTER.lat * Math.PI / 180
  for (let z = zMin; z <= zMax; z++) {
    const n = Math.pow(2, z)
    const xCenter = Math.floor((CENTER.lng + 180) / 360 * n)
    const yCenter = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n)
    // 中心 + 周围一圈
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        tiles.push({ z, x: xCenter + dx, y: yCenter + dy })
      }
    }
  }
  return tiles
}

function selectTiles(allTiles, count) {
  if (allTiles.length <= count) return allTiles
  // 均匀采样
  const step = allTiles.length / count
  const result = []
  for (let i = 0; i < count; i++) {
    result.push(allTiles[Math.floor(i * step)])
  }
  return result
}

async function testSource(source, tiles, timeoutMs) {
  const controller = new AbortController()
  abortControllers.push(controller)
  const signal = controller.signal

  const results = { success: 0, fail: 0, times: [], startTime: performance.now() }

  const promises = tiles.map(async (tile, i) => {
    const url = source.url
      .replace('{s}', source.subdomains[i % source.subdomains.length])
      .replace('{z}', tile.z)
      .replace('{x}', tile.x)
      .replace('{y}', tile.y)

    const t0 = performance.now()
    try {
      const resp = await fetch(url, { signal, cache: 'no-store' })
      const t1 = performance.now()
      // 通过 Image 实际解码确认是有效图片
      if (resp.ok) {
        const blob = await resp.blob()
        if (blob.type.startsWith('image/') && blob.size > 100) {
          results.success++
          results.times.push(t1 - t0)
        } else {
          results.fail++
        }
      } else {
        results.fail++
      }
    } catch (e) {
      if (e.name === 'AbortError') return
      results.fail++
    }
  })

  await Promise.all(promises)
  results.endTime = performance.now()
  return results
}

function renderCard(source, results, tileList) {
  const elapsed = results ? (results.endTime - results.startTime) : null
  const total = tileList.length
  const success = results ? results.success : 0
  const fail = results ? results.fail : 0
  const avgTime = results && results.times.length > 0
    ? results.times.reduce((a, b) => a + b, 0) / results.times.length
    : null
  const minTime = results && results.times.length > 0 ? Math.min(...results.times) : null
  const maxTime = results && results.times.length > 0 ? Math.max(...results.times) : null

  let statusClass = 'running'
  let statusText = '等待中...'
  if (results) {
    if (fail === total) { statusClass = 'fail'; statusText = '❌ 全部失败' }
    else if (success === total && avgTime < 200) { statusClass = 'ok'; statusText = '✅ 优秀' }
    else if (success === total && avgTime < 600) { statusClass = 'ok'; statusText = '✅ 可用' }
    else if (success === total) { statusClass = 'slow'; statusText = '⚠️ 偏慢' }
    else if (success > 0) { statusClass = 'slow'; statusText = `⚠️ ${fail}/${total} 失败` }
    else { statusClass = 'fail'; statusText = '❌ 不可用' }
  }

  let timeClass = 'good'
  if (avgTime === null) timeClass = ''
  else if (avgTime > 600) timeClass = 'warn'
  else if (avgTime > 1000) timeClass = 'bad'

  return `
    <div class="card ${statusClass}">
      <div class="card-header">
        <div>
          <h3>${source.name}</h3>
          <div class="url">${source.url}</div>
          ${source.note ? `<div style="font-size:10px;color:#fdcb6e;margin-top:2px">💡 ${source.note}</div>` : ''}
        </div>
        <div class="overlay-status">${statusText}</div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="value">${success}/${total}</div><div class="label">瓦片成功</div></div>
        <div class="metric"><div class="value ${timeClass}">${avgTime !== null ? Math.round(avgTime) + 'ms' : '—'}</div><div class="label">平均延迟</div></div>
        <div class="metric"><div class="value">${minTime !== null ? Math.round(minTime) + 'ms' : '—'}</div><div class="label">最快</div></div>
        <div class="metric"><div class="value">${maxTime !== null ? Math.round(maxTime) + 'ms' : '—'}</div><div class="label">最慢</div></div>
        <div class="metric"><div class="value">${elapsed !== null ? (elapsed / 1000).toFixed(1) + 's' : '—'}</div><div class="label">总耗时</div></div>
      </div>
      <div class="map-preview" id="map-${source.id}">
        <div class="overlay"><span class="status" id="map-status-${source.id}">等待加载...</span></div>
      </div>
    </div>
  `
}

// 实际渲染 Leaflet 小地图验证瓦片可用性
function initMiniMap(sourceId) {
  const container = document.getElementById(`map-${sourceId}`)
  if (!container) return

  const source = SOURCES.find(s => s.id === sourceId)
  if (!source) return

  // 移除 overlay
  const overlay = container.querySelector('.overlay')
  if (overlay) overlay.remove()

  const map = L.map(container, {
    center: [CENTER.lat, CENTER.lng],
    zoom: 14,
    zoomControl: false,
    attributionControl: false,
  })

  const tileLayer = L.tileLayer(source.url, {
    maxZoom: source.maxZoom,
    subdomains: source.subdomains.split(''),
    ...(source.id === 'amap-vec' ? { tms: false } : {}),
  })

  tileLayer.addTo(map)

  // 加一个中心标记确认位置
  L.circleMarker([CENTER.lat, CENTER.lng], {
    radius: 4, color: '#e94560', fillColor: '#e94560', fillOpacity: 0.8
  }).addTo(map)

  maps.push({ map, tileLayer })

  // 监听 tileerror 更新状态
  let errCount = 0
  tileLayer.on('tileerror', () => {
    errCount++
    const el = document.getElementById(`map-status-${sourceId}`)
    if (el) el.textContent = `⚠️ ${errCount} 个瓦片加载失败`
  })
  tileLayer.on('tileload', () => {
    const el = document.getElementById(`map-status-${sourceId}`)
    if (el) el.style.display = 'none'
  })

  setTimeout(() => {
    map.invalidateSize()
  }, 100)
}

async function runAll() {
  // 清理上一轮
  stopAll()
  maps.forEach(m => { try { m.map.remove() } catch {} })
  maps = []
  abortControllers = []

  const tileCount = parseInt(document.getElementById('tileCount').value)
  const zoomRange = document.getElementById('zoomRange').value
  const allTiles = buildTileList(zoomRange)
  const tiles = selectTiles(allTiles, tileCount)

  document.getElementById('btnRun').disabled = true
  document.getElementById('btnStop').style.display = 'inline-block'
  document.getElementById('summary').style.display = 'none'

  // 先渲染所有卡片（等待状态）
  const grid = document.getElementById('grid')
  grid.innerHTML = SOURCES.map(s => renderCard(s, null, tiles)).join('')

  // 并行测试所有源
  const testPromises = SOURCES.map(async (source, idx) => {
    const cardEl = grid.children[idx]
    try {
      const results = await testSource(source, tiles, 8000)
      // 更新卡片
      cardEl.outerHTML = renderCard(source, results, tiles)
      // 启动小地图
      if (results.success > 0) {
        setTimeout(() => initMiniMap(source.id), 200)
      }
      return { source, results }
    } catch (e) {
      cardEl.outerHTML = renderCard(source, { success: 0, fail: tiles.length, times: [], startTime: 0, endTime: 0 }, tiles)
      return { source, results: null, error: e.message }
    }
  })

  const allResults = await Promise.all(testPromises)

  document.getElementById('btnRun').disabled = false
  document.getElementById('btnStop').style.display = 'none'

  // 汇总
  const summary = document.getElementById('summary')
  summary.style.display = 'block'
  const lines = allResults.map(r => {
    if (!r.results) return `<strong>${r.source.name}</strong>: ❌ 测试异常 — ${r.error}`
    const avg = r.results.times.length > 0
      ? Math.round(r.results.times.reduce((a, b) => a + b, 0) / r.results.times.length)
      : null
    const rate = r.results.success + r.results.fail > 0
      ? (r.results.success / (r.results.success + r.results.fail) * 100).toFixed(0)
      : '0'
    const icon = r.results.success === tiles.length ? (avg && avg < 300 ? '✅' : '⚠️') : '❌'
    return `${icon} <strong>${r.source.name}</strong>: ${r.results.success}/${tiles.length} 成功 (${rate}%), 平均 ${avg !== null ? avg + 'ms' : 'N/A'}`
  })
  summary.innerHTML = `<div style="font-weight:700;margin-bottom:6px">📊 测试结果汇总（${tiles.length} 张瓦片, 缩放 ${zoomRange}）</div>` + lines.join('<br>')

  // 结论
  const hasGoodOSM = allResults.some(r => r.results && r.results.success === tiles.length && r.results.times.length > 0 && (r.results.times.reduce((a,b)=>a+b,0)/r.results.times.length) < 500 && r.source.id.startsWith('osm'))
  const amapOk = allResults.some(r => r.source.id === 'amap-vec' && r.results && r.results.success > tiles.length * 0.8)
  summary.innerHTML += `<br><div style="margin-top:8px;color:#fdcb6e">`
  if (hasGoodOSM) summary.innerHTML += `👉 有 OSM 镜像在国内可用，建议用该镜像替代高德作为中国用户的瓦片源（保持 WGS84 坐标系一致性）。`
  else if (amapOk) summary.innerHTML += `👉 OSM 镜像在国内均不理想，建议国内用户走高德瓦片（GCJ-02 需坐标转换）。`
  summary.innerHTML += `</div>`
}
</script>
</body>
</html>
