<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Maps POI 搜索测试 · Clementi</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.toolbar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap}
.toolbar h1{font-size:15px;font-weight:700;background:linear-gradient(135deg,#e94560,#4285f4 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.toolbar button{padding:5px 12px;border:1px solid #0f3460;border-radius:6px;background:#0f3460;color:#e0e0e0;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap}
.toolbar button:hover{background:#1a4a8a}
.toolbar button.primary{background:#e94560;border-color:#e94560;color:#fff;font-weight:600}
.toolbar button:disabled{opacity:.4;cursor:not-allowed}
.toolbar .sep{width:1px;height:16px;background:#0f3460}
.toolbar .hint{font-size:10px;color:#888;margin-left:auto}
.badge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:10px;font-weight:600}
.badge.waiting{background:#8883;color:#888}
.badge.loading{background:#e9a23b33;color:#e9a23b}
.badge.done{background:#7ebc8933;color:#7ebc89}
.badge.error{background:#e9456033;color:#e94560}
.main-wrap{display:flex;flex:1;min-height:0;gap:2px;background:#0f3460}
.map-panel{flex:1;position:relative;min-width:0}
.map-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:1000;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;pointer-events:none;backdrop-filter:blur(6px);background:rgba(26,26,46,.85);color:#ccc}
#map{width:100%;height:100%}
.leaflet-container{background:#1a1a2e!important}
.leaflet-control-zoom a{background:#16213e!important;color:#e0e0e0!important;border-color:#0f3460!important}
.side-panel{width:380px;flex-shrink:0;display:flex;flex-direction:column;background:#16213e;overflow:hidden}
.cat-tabs{display:flex;gap:1px;background:#0f3460;flex-shrink:0;overflow-x:auto;flex-wrap:wrap}
.cat-tabs button{flex:1;min-width:fit-content;padding:7px 5px;border:none;background:#1a1a2e;color:#888;font-size:10px;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.cat-tabs button:hover{color:#ccc;background:#22223a}
.cat-tabs button.active{color:#e94560;background:#16213e;border-bottom:2px solid #e94560;font-weight:700}
.results-scroll{flex:1;overflow-y:auto;padding:8px 10px}
.kw-group{margin-bottom:8px}
.kw-header{display:flex;align-items:center;gap:6px;padding:5px 7px;background:#1a1a2e;border-radius:5px;cursor:pointer;user-select:none}
.kw-header:hover{background:#22223a}
.kw-header .kw-name{font-weight:600;font-size:12px;color:#ccc}
.kw-header .counts{font-size:11px;font-variant-numeric:tabular-nums;color:#aaa}
.kw-header .arrow{font-size:9px;color:#888;transition:transform .2s;min-width:10px}
.kw-header.open .arrow{transform:rotate(90deg)}
.kw-body{display:none;padding:2px 0 0 0}
.kw-body.open{display:block}
.poi-item{display:flex;align-items:center;gap:5px;padding:3px 6px;margin:1px 0;border-radius:3px;cursor:pointer;font-size:10px;transition:background .1s}
.poi-item:hover{background:#fff1}
.poi-item .dot{width:9px;height:12px;flex-shrink:0;border-radius:50%}
.poi-item .poi-name{flex:1;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.poi-item .poi-dist{color:#888;font-size:9px;flex-shrink:0}
.poi-item.highlight{background:#e9456020!important}
.source-label{font-size:9px;color:#888;padding:3px 6px 0;text-transform:uppercase;letter-spacing:.5px}
.empty-hint{color:#555;font-size:12px;text-align:center;padding:30px 16px}
.leaflet-popup-content-wrapper{background:#16213e!important;color:#e0e0e0!important;border-radius:8px!important;font-size:11px}
.leaflet-popup-tip{background:#16213e!important}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.6}}
.spinner{display:inline-block;width:10px;height:10px;border:2px solid #888;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:3px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.main-wrap{flex-direction:column}.side-panel{width:100%;max-height:40vh}.map-panel{min-height:220px}}
</style>
</head>
<body>

<div class="toolbar">
  <h1>Google Maps POI 搜索 · Clementi</h1>
  <button id="btn1km" onclick="runTest(1000)">1km</button>
  <button id="btn2km" class="primary" onclick="runTest(2000)">2km</button>
  <button id="btn5km" onclick="runTest(5000)">5km</button>
  <button onclick="resetAll()">↺ 重置</button>
  <button id="btnCopy" onclick="copyReport()" disabled style="background:#e9a23b20;border-color:#e9a23b40;color:#e9a23b">📋 报告</button>
  <button id="btnTile" onclick="toggleTile()">🗺 瓦片</button>
  <span class="sep"></span>
  <span class="hint" id="statusHint"><span class="badge waiting">等待 API…</span></span>
</div>

<div class="main-wrap">
  <div class="map-panel">
    <div class="map-label">Clementi (1.2966, 103.7764) · <span id="radiusLabel">—</span></div>
    <div id="map"></div>
  </div>
  <div class="side-panel" id="sidePanel">
    <div class="cat-tabs" id="catTabs">
      <button data-cat="overview" class="active">📊 总览</button>
      <button data-cat="clusters">🍽 聚集</button>
    </div>
    <div class="cat-tabs" id="kwTabs" style="flex-wrap:wrap"></div>
    <div id="gmErrors" style="display:none;margin:0 8px;padding:5px 8px;background:#e9456015;border:1px solid #e9456040;border-radius:5px;font-size:10px;max-height:100px;overflow-y:auto"></div>
    <div class="results-scroll" id="resultsScroll">
      <div class="empty-hint">📍 选择搜索半径开始</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== 常量 ====================
const Clementi_LAT=1.3153,Clementi_LNG=103.7648,Clementi=[Clementi_LAT,Clementi_LNG],GM_KEY='AIzaSyA2TFWRlLOG72sJLckOBa2zWq9L-rDotzc';
// 关键词分类 + Tab 自定义顺序
const CATEGORIES={交通:["地铁站","公交站"],医疗:["医院","药店"],购物:["超市/便利店","商场","酒吧"],美食:["餐厅","cafe","烘焙","快餐","食阁"],生活:["市场","健身房"],地标:["小贩中心"]};
const KW_ORDER=["地铁站","公交站","医院","药店","超市/便利店","商场","酒吧","餐厅","cafe","烘焙","快餐","食阁","小贩中心","市场","健身房"];

// searchNearby includedTypes
const GM_NS={地铁站:["subway_station"],公交站:["bus_stop","bus_station"],医院:["hospital"],药店:["pharmacy"],"超市/便利店":["supermarket","convenience_store"],商场:["shopping_mall"],酒吧:["bar"],餐厅:["restaurant"],cafe:["cafe"],烘焙:["bakery"],快餐:["meal_takeaway"],食阁:["restaurant"],小贩中心:[],市场:["market"],健身房:["gym"]};

// 全部美食类走 searchText + 网格分割
const HIGH_DENSITY=new Set(["餐厅","cafe","烘焙","快餐","食阁"]);

function $(id){return document.getElementById(id)}

// ==================== 地图 ====================
let map,searchRect,currentRadius=0,currentCat='overview',running=false;
let gmR={},_poiIndex=0,_poiMap={};
let gmMarkers=[],clusterCircles=[],highlighted=null,lastGmTime=0;
let osmTile,gmTile,tileIsOsm=true;

function initMap(){
  map=L.map('map',{center:Clementi,zoom:14,zoomControl:true,attributionControl:false});
  osmTile=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OSM'}).addTo(map);
  gmTile=L.tileLayer('https://mt{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{maxZoom:19,attribution:'&copy; Google',subdomains:['0','1','2','3']});
  updateTileBtn();
  L.marker(Clementi,{icon:L.divIcon({className:'',html:'<div style="background:#e94560;color:#fff;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap">🎓 Clementi</div>',iconAnchor:[15,10]})}).addTo(map);
}
function toggleTile(){tileIsOsm=!tileIsOsm;(tileIsOsm?osmTile:gmTile).addTo(map);(tileIsOsm?gmTile:osmTile).remove();updateTileBtn()}
function updateTileBtn(){const b=$('btnTile');if(b){b.textContent=tileIsOsm?'🗺 OSM':'🛰 Google';b.style.background=tileIsOsm?'#0f3460':'#1a4a8a'}}

// ==================== 工具 ====================
function havDistance(lat1,lng1,lat2,lng2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;return R*2*Math.atan2(Math.sqrt(Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2),Math.sqrt(1-Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2))}
function circleToRect(lat,lng,r){const dLat=r/111320,dLng=r/(111320*Math.cos(lat*Math.PI/180));return{low:{latitude:lat-dLat,longitude:lng-dLng},high:{latitude:lat+dLat,longitude:lng+dLng}}}
function showGmError(msg){const el=$('gmErrors');if(el){el.style.display='block';el.innerHTML+='<div>❌ '+msg+'</div>'}console.error('[GM]',msg)}
function clearGmErrors(){const el=$('gmErrors');if(el){el.style.display='none';el.innerHTML=''}}

// ==================== 区域分割 ====================
// 把矩形分成 grid×grid 个子格，每格独立搜 60 条突破总量上限
function splitRect(rect,grid){
  const dLat=(rect.high.latitude-rect.low.latitude)/grid;
  const dLng=(rect.high.longitude-rect.low.longitude)/grid;
  const cells=[];
  for(let r=0;r<grid;r++)for(let c=0;c<grid;c++){
    cells.push({low:{latitude:rect.low.latitude+r*dLat,longitude:rect.low.longitude+c*dLng},high:{latitude:rect.low.latitude+(r+1)*dLat,longitude:rect.low.longitude+(c+1)*dLng}});
  }
  return cells;
}

// ==================== Google 搜索 ====================
// 高密度词(区域分割 searchText 最高240条) + 一般词(searchNearby 20条)
async function searchGM(cnKw,radius){
  if(HIGH_DENSITY.has(cnKw)){
    const enKw=({餐厅:"restaurant",cafe:"cafe",烘焙:"bakery",快餐:"fast food",食阁:"food centre"})[cnKw];
    const fullRect=circleToRect(Clementi_LAT,Clementi_LNG,radius);
    const cells=splitRect(fullRect,2); // 2×2=4 个子格
    const seen=new Set();const all=[];
    for(const cell of cells){
      let pt=null,pc=0;
      while(pc<3){
        const body={textQuery:enKw,pageSize:20,locationRestriction:{rectangle:cell}};
        if(pt)body.pageToken=pt;
        try{
          const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':GM_KEY,'X-Goog-FieldMask':'places.displayName,places.location,places.formattedAddress,places.rating,places.id,nextPageToken'},body:JSON.stringify(body)});
          if(!r.ok){const t=await r.text();let msg=t;try{msg=JSON.parse(t).error?.message||t}catch(_){}showGmError(`${cnKw}→${enKw}: HTTP ${r.status} — ${msg.substring(0,100)}`);break}
          const d=await r.json();const ps=d.places||[];pc++;
          for(const p of ps){const pid=p.id;if(seen.has(pid))continue;seen.add(pid);const lat=p.location?.latitude,lng=p.location?.longitude;if(lat==null||lng==null)continue;all.push({name:p.displayName?.text||enKw,lat,lng,distance_m:Math.round(havDistance(Clementi_LAT,Clementi_LNG,lat,lng)),keyword:cnKw,source:'google',vicinity:p.formattedAddress||'',rating:p.rating||null,place_id:pid})}
          if(d.nextPageToken){pt=d.nextPageToken;await new Promise(r=>setTimeout(r,400))}else break;
        }catch(e){showGmError(`${cnKw}: 网络错误`);break}
      }
    }
    console.log(`[GM-ST] ${cnKw}→${enKw} TOTAL: ${all.length} (4格去重)`);
    return all;
  }
  // 无 includedTypes → searchText 单次（如小贩中心）
  const types=GM_NS[cnKw];const hasNoType=!types||!types.length;
  if(hasNoType){
    const enKw=({小贩中心:"hawker centre"})[cnKw]||cnKw;
    const rect=circleToRect(Clementi_LAT,Clementi_LNG,radius);const all=[];let pt=null,pc=0;
    while(pc<3){const body={textQuery:enKw,pageSize:20,locationRestriction:{rectangle:rect}};if(pt)body.pageToken=pt;try{const r=await fetch('https://places.googleapis.com/v1/places:searchText',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':GM_KEY,'X-Goog-FieldMask':'places.displayName,places.location,places.formattedAddress,places.rating,places.id,nextPageToken'},body:JSON.stringify(body)});if(!r.ok)break;const d=await r.json();const ps=d.places||[];pc++;for(const p of ps){const lat=p.location?.latitude,lng=p.location?.longitude;if(lat==null||lng==null)continue;all.push({name:p.displayName?.text||enKw,lat,lng,distance_m:Math.round(havDistance(Clementi_LAT,Clementi_LNG,lat,lng)),keyword:cnKw,source:'google',vicinity:p.formattedAddress||'',rating:p.rating||null,place_id:p.id||''})}if(d.nextPageToken){pt=d.nextPageToken;await new Promise(r=>setTimeout(r,400))}else break}catch(e){break}}
    console.log(`[GM-ST] ${cnKw}→${enKw} TOTAL: ${all.length}`);
    return all;
  }
  // searchNearby
  try{
    const r=await fetch('https://places.googleapis.com/v1/places:searchNearby',{method:'POST',headers:{'Content-Type':'application/json','X-Goog-Api-Key':GM_KEY,'X-Goog-FieldMask':'places.id,places.displayName,places.location,places.formattedAddress,places.rating'},body:JSON.stringify({includedTypes:types,maxResultCount:20,locationRestriction:{circle:{center:{latitude:Clementi_LAT,longitude:Clementi_LNG},radius:radius}}})});
    if(!r.ok){const t=await r.text();let msg=t;try{msg=JSON.parse(t).error?.message||t}catch(_){}showGmError(`${cnKw}(${types}): HTTP ${r.status} — ${msg.substring(0,150)}`);return[]}
    const d=await r.json();const ps=d.places||[];
    console.log(`[GM-NS] ${cnKw} ${types} → ${ps.length}`);
    return ps.map(p=>{const lat=p.location?.latitude,lng=p.location?.longitude;if(lat==null||lng==null)return null;return{name:p.displayName?.text||cnKw,lat,lng,distance_m:Math.round(havDistance(Clementi_LAT,Clementi_LNG,lat,lng)),keyword:cnKw,source:'google',vicinity:p.formattedAddress||'',rating:p.rating||null,place_id:p.id||''}}).filter(Boolean);
  }catch(e){showGmError(`${cnKw}: 网络错误`);return[]}

// ==================== 去重 ====================
function dedupGm(keyword,thresholdM){
  const pois=gmR[keyword];if(!pois||!pois.length)return;
  const sorted=[...pois].sort((a,b)=>a.distance_m-b.distance_m);
  const kept=[];
  for(const p of sorted){if(!kept.some(k=>havDistance(p.lat,p.lng,k.lat,k.lng)<thresholdM))kept.push(p)}
  gmR[keyword]=kept;
}
// 同名+同区域去重（连锁店/重复条目）
function dedupGmByName(keyword,thresholdM){
  const pois=gmR[keyword];if(!pois||!pois.length)return;
  const sorted=[...pois].sort((a,b)=>a.distance_m-b.distance_m);
  const kept=[];
  for(const p of sorted){
    const norm=p.name.toLowerCase().replace(/[^a-z0-9一-鿿]/g,'');
    if(!kept.some(k=>{const kn=k.name.toLowerCase().replace(/[^a-z0-9一-鿿]/g,'');return (norm===kn||norm.includes(kn)||kn.includes(norm))&&havDistance(p.lat,p.lng,k.lat,k.lng)<thresholdM}))kept.push(p);
  }
  gmR[keyword]=kept;
}

// ==================== 聚集分析 ====================
const CLUSTER_DIST=150,MIN_CLUSTER=3,AMENITY_RADIUS=300;
function findClusters(pois){
  const parent=pois.map((_,i)=>i);
  function find(i){while(parent[i]!==i){parent[i]=parent[parent[i]];i=parent[i]}return i}
  function union(a,b){const ra=find(a),rb=find(b);if(ra!==rb)parent[rb]=ra}
  for(let i=0;i<pois.length;i++)for(let j=i+1;j<pois.length;j++)if(havDistance(pois[i].lat,pois[i].lng,pois[j].lat,pois[j].lng)<CLUSTER_DIST)union(i,j);
  const groups={};pois.forEach((p,i)=>{const r=find(i);if(!groups[r])groups[r]=[];groups[r].push(p)});
  // 配套索引
  const pharmacies=gmR['药店']||[],gyms=gmR['健身房']||[],bars=gmR['酒吧']||[],markets=gmR['市场']||[];
  return Object.values(groups).filter(g=>g.length>=MIN_CLUSTER).map(g=>{
    const clat=g.reduce((s,p)=>s+p.lat,0)/g.length,clng=g.reduce((s,p)=>s+p.lng,0)/g.length;
    // 美食类型构成
    const types={};g.forEach(p=>{types[p.keyword]=(types[p.keyword]||0)+1});
    const typeCount=Object.keys(types).length;
    // 周边配套（300m 内）
    const nearAmenities=[];
    if(pharmacies.some(a=>havDistance(clat,clng,a.lat,a.lng)<AMENITY_RADIUS))nearAmenities.push('💊药房');
    if(gyms.some(a=>havDistance(clat,clng,a.lat,a.lng)<AMENITY_RADIUS))nearAmenities.push('🏋️健身房');
    if(bars.some(a=>havDistance(clat,clng,a.lat,a.lng)<AMENITY_RADIUS))nearAmenities.push('🍸酒吧');
    if(markets.some(a=>havDistance(clat,clng,a.lat,a.lng)<AMENITY_RADIUS))nearAmenities.push('🛒市场');
    // 命名：商场 → 地铁站 → 兜底
    let name=null;
    const malls=gmR['商场']||[],stations=gmR['地铁站']||[];
    const nearMall=malls.filter(m=>havDistance(clat,clng,m.lat,m.lng)<250).sort((a,b)=>a.distance_m-b.distance_m);
    if(nearMall.length){name=nearMall[0].name;c._nearestMall=nearMall[0]}
    if(!name){const nearSt=stations.filter(s=>havDistance(clat,clng,s.lat,s.lng)<400).sort((a,b)=>a.distance_m-b.distance_m);if(nearSt.length){name='Near '+nearSt[0].name.replace(/Exit \w|Entrance \w|出口|入口/gi,'').trim();c._nearestSt=nearSt[0]}}
    if(!name){const vc={};g.forEach(p=>{const v=(p.vicinity||'').split(',')[0].trim();if(v)vc[v]=(vc[v]||0)+1});name=Object.entries(vc).sort((a,b)=>b[1]-a[1])[0]?.[0]||'未知区域'}
    // 评分
    const ratings=g.filter(p=>p.rating).map(p=>p.rating);const avgRating=ratings.length?ratings.reduce((s,r)=>s+r,0)/ratings.length:0;
    // 分级：纯数量
    let grade;if(g.length>=20)grade='A';else if(g.length>=10)grade='B';else if(g.length>=5)grade='C';else grade='D';
    return{name,lat:clat,lng:clng,count:g.length,grade,avgRating,types,typeCount,nearAmenities,members:g};
  }).sort((a,b)=>b.count-a.count);
}

// ==================== 主流程 ====================
async function runTest(radius){
  if(running)return;running=true;currentRadius=radius;
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy'&&b.id!=='btnTile')b.disabled=true});
  $('radiusLabel').textContent=`${radius/1000}km 矩形(2×2格)`;
  $('statusHint').innerHTML='<span class="badge loading"><span class="spinner"></span>搜索中…</span>';
  const rrect=circleToRect(Clementi_LAT,Clementi_LNG,radius);
  const rbounds=[[rrect.low.latitude,rrect.low.longitude],[rrect.high.latitude,rrect.high.longitude]];
  if(searchRect)map.removeLayer(searchRect);
  searchRect=L.rectangle(rbounds,{color:'#e94560',weight:2,fillColor:'#e9456033',fillOpacity:.12,dashArray:'6 3'}).addTo(map);
  map.fitBounds(rbounds,{padding:[30,30]});
  // 2×2 网格虚线
  const dLat=(rrect.high.latitude-rrect.low.latitude)/2,dLng=(rrect.high.longitude-rrect.low.longitude)/2;
  L.polyline([[rrect.low.latitude+dLat,rrect.low.longitude],[rrect.low.latitude+dLat,rrect.high.longitude]],{color:'#e9456040',weight:1,dashArray:'3 6'}).addTo(map);
  L.polyline([[rrect.low.latitude,rrect.low.longitude+dLng],[rrect.high.latitude,rrect.low.longitude+dLng]],{color:'#e9456040',weight:1,dashArray:'3 6'}).addTo(map);

  gmR={};_poiIndex=0;for(const k of Object.keys(_poiMap))delete _poiMap[k];clearMarkers();clearGmErrors();renderResults();

  const tasks=[];for(const[,kws]of Object.entries(CATEGORIES))for(const kw of kws)tasks.push(kw);
  const t0=performance.now();
  // 并发 6 个
  const sem=new(class{constructor(l){this.l=l;this.r=0;this.q=[]}async run(f){while(this.r>=this.l)await new Promise(r=>this.q.push(r));this.r++;try{return await f()}finally{this.r--;const n=this.q.shift();if(n)n()}}})(6);
  await Promise.all(tasks.map(kw=>sem.run(()=>searchGM(kw,radius).then(r=>{gmR[kw]=r;renderProgress()}))));
  lastGmTime=performance.now()-t0;

  dedupGm("医院",200);dedupGm("商场",150);dedupGm("市场",150);
  // 美食类关键词——同名同区域去重（连锁店/重复条目）
  for(const kw of["餐厅","cafe","烘焙","快餐","食阁"])dedupGmByName(kw,50);

  running=false;
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy'&&b.id!=='btnTile')b.disabled=false});
  $('btnCopy').disabled=false;
  $('statusHint').innerHTML=`<span class="badge done">✓ ${lastGmTime.toFixed(0)}ms · ${Object.values(gmR).flat().length} POIs</span>`;
  renderResults();
}

function renderProgress(){
  const total=Object.values(gmR).flat().length;
  $('statusHint').innerHTML=`<span class="badge loading"><span class="spinner"></span>${total} POIs</span>`;
}

// ==================== 地图标记 ====================
// 关键词颜色映射
const KW_COLORS={餐厅:'#a855f7',cafe:'#92400e',烘焙:'#ea580c',快餐:'#dc2626',食阁:'#0d9488',地铁站:'#6366f1',公交站:'#3b82f6',医院:'#ef4444',药店:'#22c55e','超市/便利店':'#f59e0b',商场:'#ec4899',酒吧:'#a855f7',市场:'#84cc16',健身房:'#06b6d4'};

// 水滴图标工厂
function pinIcon(color,size){const w=size||14,h=w*1.4;return L.divIcon({className:'',html:`<svg width="${w}" height="${h}" viewBox="0 0 20 28"><path d="M10 0C4.5 0 0 4.5 0 10c0 7 10 18 10 18s10-11 10-18C20 4.5 15.5 0 10 0z" fill="${color}" stroke="#fff" stroke-width="1"/><circle cx="10" cy="9" r="3" fill="rgba(255,255,255,.5)"/></svg>`,iconSize:[w,h],iconAnchor:[w/2,h],popupAnchor:[0,-h+2]})}
// 商场/地铁站用大图标
const bigMallIcon=pinIcon('#ec4899',20);
const bigStationIcon=pinIcon('#6366f1',20);

const hlIcon=L.divIcon({className:'',html:`<svg width="22" height="31" viewBox="0 0 20 28"><path d="M10 0C4.5 0 0 4.5 0 10c0 7 10 18 10 18s10-11 10-18C20 4.5 15.5 0 10 0z" fill="#e94560" stroke="#fff" stroke-width="2"/><circle cx="10" cy="9" r="3" fill="#fff"/></svg>`,iconSize:[22,31],iconAnchor:[11,31],popupAnchor:[0,-29]});

function clearMarkers(){gmMarkers.forEach(m=>map.removeLayer(m));gmMarkers=[];clusterCircles.forEach(c=>map.removeLayer(c));clusterCircles=[];if(highlighted){map.removeLayer(highlighted);highlighted=null}}

function addMarkers(){
  clearMarkers();
  let pois=[];
  if(currentCat==='overview')pois=Object.values(gmR).flat();
  else if(currentCat==='clusters'){/* handled in renderResults */}
  else if(Object.values(CATEGORIES).some(kws=>kws.includes(currentCat)))pois=gmR[currentCat]||[];
  else{const kws=CATEGORIES[currentCat]||[];for(const kw of kws)if(gmR[kw])pois.push(...gmR[kw])}
  const dedupRadii={医院:200,商场:150,市场:150};
  for(const p of pois){
    const isBig=p.keyword==='商场'||p.keyword==='地铁站';
    const m=L.marker([p.lat,p.lng],{icon:isBig?pinIcon(KW_COLORS[p.keyword]||'#a855f7',20):pinIcon(KW_COLORS[p.keyword]||'#a855f7')});
    const tip=`<b>${p.name}</b><br>${p.keyword} · ${p.distance_m}m${p.rating?' · ⭐'+p.rating:''}${dedupRadii[p.keyword]?'<br><small style="color:#e9a23b">去重半径: '+dedupRadii[p.keyword]+'m</small>':''}`;
    m.bindTooltip(tip,{direction:'top'});
    m._poiData=p;m.addTo(map);gmMarkers.push(m);
    // 商场/医院/市场：hover 显示去重圈
    if(dedupRadii[p.keyword]){
      let hoverCircle=null;
      m.on('mouseover',()=>{hoverCircle=L.circle([p.lat,p.lng],{radius:dedupRadii[p.keyword],color:'#e9a23b',weight:1,fillColor:'#e9a23b',fillOpacity:.1,dashArray:'4 2'}).addTo(map)});
      m.on('mouseout',()=>{if(hoverCircle){map.removeLayer(hoverCircle);hoverCircle=null}});
    }
  }
  // 聚集圈
  if(currentCat==='美食'||currentCat==='餐厅'||currentCat==='cafe'||currentCat==='烘焙'||currentCat==='快餐'||currentCat==='食阁'||currentCat==='clusters'){
    const allR=[...(gmR['餐厅']||[]),...(gmR['cafe']||[]),...(gmR['烘焙']||[]),...(gmR['快餐']||[]),...(gmR['食阁']||[])];
    if(allR.length>=MIN_CLUSTER){const cs=findClusters(allR);const colors={A:'#e94560',B:'#e9a23b',C:'#4285f4',D:'#7ebc89'};for(const c of cs){const r=Math.min(c.count*8,200);const circle=L.circle([c.lat,c.lng],{radius:r,color:colors[c.grade],weight:2,fillColor:colors[c.grade],fillOpacity:.15}).addTo(map);const amenityStr=c.nearAmenities?.join('')||'';const label=L.marker([c.lat,c.lng],{icon:L.divIcon({className:'',html:`<div style="background:${colors[c.grade]};color:#fff;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;white-space:nowrap">${c.grade} ${c.name} (${c.count})${amenityStr?' '+amenityStr:''}</div>`,iconAnchor:[35,10]}),zIndexOffset:1000}).addTo(map);clusterCircles.push(circle,label);
    // 标注聚集地附近的商场/地铁站
    if(c._nearestMall){const m=L.marker([c._nearestMall.lat,c._nearestMall.lng],{icon:bigMallIcon,zIndexOffset:999});m.bindTooltip(`<b>${c._nearestMall.name}</b><br>商场 · ${c._nearestMall.distance_m}m`,{direction:'top'});m.addTo(map);clusterCircles.push(m)}
    if(c._nearestSt){const m=L.marker([c._nearestSt.lat,c._nearestSt.lng],{icon:bigStationIcon,zIndexOffset:999});m.bindTooltip(`<b>${c._nearestSt.name}</b><br>地铁站 · ${c._nearestSt.distance_m}m`,{direction:'top'});m.addTo(map);clusterCircles.push(m)}
    }}
  }
}

function flyToPoi(poi){
  document.querySelectorAll('.poi-item.highlight').forEach(el=>el.classList.remove('highlight'));
  for(const[id,p]of Object.entries(_poiMap)){if(p===poi){const el=document.querySelector(`.poi-item[data-poi-id="${id}"]`);if(el){el.classList.add('highlight');el.scrollIntoView({behavior:'smooth',block:'center'})}break}}
  if(highlighted)map.removeLayer(highlighted);
  highlighted=L.marker([poi.lat,poi.lng],{icon:hlIcon}).addTo(map).bindPopup(`<b>${poi.name}</b><br>${poi.keyword} · ${poi.distance_m}m`).openPopup();
  map.flyTo([poi.lat,poi.lng],17,{duration:.5});
}

// ==================== 渲染 ====================
function poiItemHTML(p){const id='poi_'+(_poiIndex++);_poiMap[id]=p;const c=KW_COLORS[p.keyword]||'#a855f7';return`<div class="poi-item" data-poi-id="${id}"><span class="dot" style="background:${c}"></span><span class="poi-name">${p.name.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span><span class="poi-dist">${p.distance_m}m${p.rating?' ⭐'+p.rating:''}</span></div>`}

document.getElementById('resultsScroll').addEventListener('click',e=>{const item=e.target.closest('.poi-item');if(item){const p=_poiMap[item.dataset.poiId];if(p)flyToPoi(p)}});

function toggleKw(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}

function renderResults(){
  const scroll=$('resultsScroll'),cat=currentCat;
  if(!Object.keys(gmR).length){scroll.innerHTML='<div class="empty-hint">📍 选择搜索半径开始</div>';return}

  if(cat==='overview'){
    let h='<div style="font-size:11px;color:#aaa;margin-bottom:6px">📊 分类总览</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:10px"><thead><tr style="color:#888;font-size:9px;text-transform:uppercase"><th style="text-align:left;padding:3px 4px">分类</th><th style="padding:3px 4px">结果数</th></tr></thead><tbody>';
    let total=0;
    for(const[catName,kws]of Object.entries(CATEGORIES)){
      const cnt=kws.reduce((s,kw)=>s+(gmR[kw]?.length||0),0);total+=cnt;
      h+=`<tr style="cursor:pointer" onclick="switchTab('${catName}')"><td style="padding:4px 4px;font-weight:600">${catName}</td><td style="padding:4px 4px;text-align:center;color:#4285f4;font-weight:600">${cnt}</td></tr>`;
    }
    h+=`<tr style="border-top:1px solid #0f3460"><td style="padding:4px 4px;font-weight:700">合计</td><td style="padding:4px 4px;text-align:center;color:#4285f4;font-weight:700">${total}</td></tr></tbody></table>`;
    h+=`<div style="margin-top:8px;padding:6px;background:#1a1a2e;border-radius:5px;font-size:10px;color:#aaa">⏱ ${lastGmTime.toFixed(0)}ms<br><span style="color:#888;font-size:9px">高密度词(searchText 60条): 餐厅/美食/快餐<br>一般词(searchNearby 20条): 其余</span></div>`;
    h+=`<div style="margin-top:6px;padding:6px;background:#1a1a2e;border-radius:5px;font-size:10px;color:#888;line-height:1.5"><b style="color:#aaa">includedTypes 对照</b><br>`;
    for(const[kw,types]of Object.entries(GM_NS))h+=`<span style="color:#ccc">${kw}</span> → <span style="color:#4285f4">${types.join(',')}</span> &nbsp;`;
    h+='</div>';
    scroll.innerHTML=h;
  }else if(cat==='clusters'){
    const allR=[...(gmR['餐厅']||[]),...(gmR['cafe']||[]),...(gmR['烘焙']||[]),...(gmR['快餐']||[]),...(gmR['食阁']||[])];
    if(!allR.length){scroll.innerHTML='<div class="empty-hint">🍽 暂无餐厅数据</div>'}
    else{const cs=findClusters(allR);if(!cs.length){scroll.innerHTML='<div class="empty-hint">📍 未发现有效聚集（需≥3家）</div>'}
    else{const colors={A:'#e94560',B:'#e9a23b',C:'#4285f4',D:'#7ebc89'};let h='<div style="font-size:11px;color:#aaa;margin-bottom:4px">🍽 美食聚集分析（150m聚类）</div>';h+='<div style="font-size:9px;color:#888;margin-bottom:4px">A 20+家 B 10-19家 C 5-9家 D 3-4家</div>';
    for(const c of cs){const typesStr=Object.entries(c.types||{}).map(([k,v])=>`${k}×${v}`).join(' ');h+=`<div class="kw-group"><div class="kw-header open" onclick="toggleKw(this);map.flyTo([${c.lat},${c.lng}],16,{duration:.5})"><span class="arrow">▶</span><span class="kw-name" style="color:${colors[c.grade]}">${c.grade} ${c.name}</span><span class="counts">${c.count}家${c.avgRating?' ⭐'+c.avgRating.toFixed(1):''}</span></div><div class="kw-body open" style="font-size:10px;color:#aaa"><div style="padding:2px 6px;color:#888">${typesStr}${c.nearAmenities?.length?' | '+c.nearAmenities.join(' '):''}</div>`;
    for(const m of c.members.slice(0,10))h+=poiItemHTML(m);
    if(c.members.length>10)h+=`<div style="color:#888;font-size:9px;padding:2px 6px">… 还有 ${c.members.length-10} 家</div>`;
    h+='</div></div>';}
    scroll.innerHTML=h;}}
  }else if(Object.values(CATEGORIES).some(kws=>kws.includes(cat))){
    // 单个关键词
    const pois=gmR[cat]||[];const ns=GM_NS[cat]||[];
    let h=`<div style="font-size:12px;font-weight:700;color:#ccc;margin-bottom:8px">🔍 ${cat} <span style="font-size:10px;color:#888;font-weight:400">(${ns.join(',')}) · ${pois.length}个</span></div>`;
    for(const p of pois.slice(0,50))h+=poiItemHTML(p);
    if(pois.length>50)h+=`<div style="color:#888;font-size:9px;padding:2px 6px">… 还有 ${pois.length-50} 个</div>`;
    scroll.innerHTML=h||'<div class="empty-hint">无结果</div>';
  }else{
    // 分类视图
    const kws=CATEGORIES[cat]||[];let h='';
    for(const kw of kws){const pois=gmR[kw]||[];if(!pois.length)continue;h+=`<div class="kw-group"><div class="kw-header open" onclick="toggleKw(this)"><span class="arrow">▶</span><span class="kw-name">${kw}</span><span class="counts">${pois.length}个</span></div><div class="kw-body open">`;
    for(const p of pois.slice(0,30))h+=poiItemHTML(p);if(pois.length>30)h+=`<div style="color:#888;font-size:9px;padding:2px 6px">… 还有 ${pois.length-30} 个</div>`;h+='</div></div>';}
    scroll.innerHTML=h||'<div class="empty-hint">无结果</div>';
  }
  addMarkers();
}

// ==================== Tab ====================
const kwTabs=document.getElementById('kwTabs');
for(const kw of KW_ORDER){const btn=document.createElement('button');btn.dataset.kw=kw;btn.textContent=kw;kwTabs.appendChild(btn)}
document.getElementById('catTabs').addEventListener('click',e=>{if(e.target.tagName==='BUTTON')switchTab(e.target.dataset.cat)});
kwTabs.addEventListener('click',e=>{if(e.target.tagName==='BUTTON'){currentCat=e.target.dataset.kw;updateActiveTab();renderResults()}});
function switchTab(cat){currentCat=cat;updateActiveTab();renderResults()}
function updateActiveTab(){document.querySelectorAll('#catTabs button,#kwTabs button').forEach(b=>{const a=(b.dataset.cat===currentCat||b.dataset.kw===currentCat);b.classList.toggle('active',a)})}

// ==================== 报告 ====================
function copyReport(){
  let r=[];r.push('═══════════════════════');r.push(' Google Maps POI 测试报告');r.push('═══════════════════════');r.push(`位置: Clementi (${Clementi_LAT}, ${Clementi_LNG})`);r.push(`范围: ${currentRadius?currentRadius/1000+'km 矩形(2×2格)':'N/A'}`);r.push(`耗时: ${lastGmTime.toFixed(0)}ms`);r.push('');
  for(const[cat,kws]of Object.entries(CATEGORIES)){r.push(`── ${cat} ──`);for(const kw of kws){const cnt=(gmR[kw]||[]).length;const types=(GM_NS[kw]||[]).join(',');r.push(`  ${kw} (${types}): ${cnt}`)}}
  r.push('');r.push('═══════════════════════');
  navigator.clipboard.writeText(r.join('\n')).then(()=>{$('statusHint').innerHTML='<span class="badge done">✅ 已复制</span>';setTimeout(()=>{$('statusHint').innerHTML=`<span class="badge done">✓ ${lastGmTime.toFixed(0)}ms</span>`},2000)}).catch(()=>{const ta=document.createElement('textarea');ta.value=r.join('\n');document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});
}

function resetAll(){
  running=false;gmR={};lastGmTime=0;currentRadius=0;_poiIndex=0;for(const k of Object.keys(_poiMap))delete _poiMap[k];
  clearMarkers();clearGmErrors();if(searchRect){map.removeLayer(searchRect);searchRect=null}
  currentCat='overview';updateActiveTab();$('radiusLabel').textContent='—';
  $('resultsScroll').innerHTML='<div class="empty-hint">📍 选择搜索半径开始</div>';
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy'&&b.id!=='btnTile')b.disabled=false});
  $('btnCopy').disabled=true;$('statusHint').innerHTML='<span class="badge waiting">就绪</span>';map.setView(Clementi,14);
}

// ==================== 启动 ====================
initMap();
window.initMap=function(){document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy'&&b.id!=='btnTile')b.disabled=false});$('statusHint').innerHTML='<span class="badge waiting">就绪</span>'};
(function(){const s=document.createElement('script');s.src=`https://maps.googleapis.com/maps/api/js?key=${GM_KEY}&callback=initMap`;s.async=true;s.defer=true;document.head.appendChild(s)})();
</script>
