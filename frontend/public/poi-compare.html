<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSM vs Google Maps — POI 周边搜索对比 · NUS</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* 顶栏 */
.toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#16213e;border-bottom:1px solid #0f3460;flex-shrink:0;flex-wrap:wrap}
.toolbar h1{font-size:16px;font-weight:700;background:linear-gradient(135deg,#e94560,#0f3460 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.toolbar button{padding:6px 14px;border:1px solid #0f3460;border-radius:7px;background:#0f3460;color:#e0e0e0;font-size:12px;cursor:pointer;transition:all .2s;white-space:nowrap}
.toolbar button:hover{background:#1a4a8a}
.toolbar button.primary{background:#e94560;border-color:#e94560;color:#fff;font-weight:600}
.toolbar button.primary:hover{background:#d63850}
.toolbar button:disabled{opacity:.4;cursor:not-allowed}
.toolbar button.active{border-color:#4285f4;box-shadow:0 0 0 1px #4285f4}
.toolbar .sep{width:1px;height:18px;background:#0f3460}
.toolbar .hint{font-size:11px;color:#888;margin-left:auto}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.badge.waiting{background:#8883;color:#888}
.badge.loading{background:#e9a23b33;color:#e9a23b}
.badge.done{background:#7ebc8933;color:#7ebc89}
.badge.error{background:#e9456033;color:#e94560}

/* 主体 */
.main-wrap{display:flex;flex:1;min-height:0;gap:2px;background:#0f3460}
.map-panel{flex:1;position:relative;min-width:0}
.map-panel .map-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:1000;padding:4px 12px;border-radius:14px;font-size:11px;font-weight:600;pointer-events:none;backdrop-filter:blur(6px);background:rgba(26,26,46,.85);color:#ccc}
#map{width:100%;height:100%}
.leaflet-container{background:#1a1a2e!important}
.leaflet-control-zoom a{background:#16213e!important;color:#e0e0e0!important;border-color:#0f3460!important}

/* 右侧面板 */
.side-panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;background:#16213e;overflow:hidden}
.side-panel.loading-state{pointer-events:none;opacity:.6}

/* 分类 Tab */
.cat-tabs{display:flex;gap:1px;background:#0f3460;flex-shrink:0;overflow-x:auto}
.cat-tabs button{flex:1;min-width:fit-content;padding:8px 6px;border:none;background:#1a1a2e;color:#888;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;font-weight:500}
.cat-tabs button:hover{color:#ccc;background:#22223a}
.cat-tabs button.active{color:#e94560;background:#16213e;border-bottom:2px solid #e94560;font-weight:700}

/* 过滤行 */
.filter-row{display:flex;gap:6px;padding:8px 12px;background:#1a1a2e;border-bottom:1px solid #0f3460;flex-shrink:0;align-items:center}
.filter-row span{font-size:10px;color:#888;margin-right:4px}
.filter-row label{font-size:11px;color:#aaa;cursor:pointer;display:flex;align-items:center;gap:3px}
.filter-row input[type=radio]{accent-color:#e94560}

/* 搜索结果列表 */
.results-scroll{flex:1;overflow-y:auto;padding:8px 12px}
.kw-group{margin-bottom:10px}
.kw-header{display:flex;align-items:center;gap:8px;padding:6px 8px;background:#1a1a2e;border-radius:6px;cursor:pointer;user-select:none;transition:background .15s}
.kw-header:hover{background:#22223a}
.kw-header .kw-name{font-weight:600;font-size:13px;color:#ccc}
.kw-header .counts{display:flex;gap:8px;margin-left:auto;font-size:11px;font-variant-numeric:tabular-nums}
.kw-header .c-osm{color:#7ebc89}
.kw-header .c-gm{color:#4285f4}
.kw-header .arrow{font-size:10px;color:#888;transition:transform .2s;min-width:12px;text-align:center}
.kw-header.open .arrow{transform:rotate(90deg)}
.kw-body{display:none;padding:4px 0 0 0}
.kw-body.open{display:block}

/* POI 条目 */
.poi-item{display:flex;align-items:center;gap:6px;padding:4px 8px;margin:1px 0;border-radius:4px;cursor:pointer;font-size:11px;transition:background .1s}
.poi-item:hover{background:#fff1}
.poi-item .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.poi-item .dot.osm{background:#7ebc89}
.poi-item .dot.gm{background:#4285f4}
.poi-item .poi-name{flex:1;color:#ccc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.poi-item .poi-dist{color:#888;font-size:10px;flex-shrink:0;font-variant-numeric:tabular-nums}
.poi-item.highlight{background:#e9456020!important;border-radius:4px}

.source-label{font-size:10px;color:#888;padding:4px 8px 0;text-transform:uppercase;letter-spacing:.5px}

/* 空状态 */
.empty-hint{color:#555;font-size:13px;text-align:center;padding:40px 20px}
.empty-hint .icon{font-size:32px;margin-bottom:8px}

/* 地图 popup 自定义 */
.leaflet-popup-content-wrapper{background:#16213e!important;color:#e0e0e0!important;border-radius:8px!important;font-size:12px}
.leaflet-popup-tip{background:#16213e!important}
.leaflet-popup-close-button{color:#888!important}

@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.6}}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #888;border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;margin-right:4px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:900px){.main-wrap{flex-direction:column}.side-panel{width:100%;max-height:45vh}.map-panel{min-height:250px}}
</style>
</head>
<body>

<div class="toolbar">
  <h1>OSM vs Google · POI 周边搜索对比</h1>
  <button id="btn1km" onclick="runTest(1000)">1km</button>
  <button id="btn2km" class="primary active" onclick="runTest(2000)">2km</button>
  <button id="btn5km" onclick="runTest(5000)">5km</button>
  <button onclick="resetAll()">↺ 重置</button>
  <button id="btnCopy" onclick="copyReport()" disabled style="background:#e9a23b20;border-color:#e9a23b40;color:#e9a23b">📋 复制报告</button>
  <span class="sep"></span>
  <span class="hint" id="statusHint"><span class="badge waiting">等待 Google Maps API…</span></span>
</div>

<div class="main-wrap">
  <!-- 地图 -->
  <div class="map-panel">
    <div class="map-label">NUS (1.2966, 103.7764) · <span id="radiusLabel">—</span></div>
    <div id="map"></div>
  </div>

  <!-- 右侧面板 -->
  <div class="side-panel" id="sidePanel">
    <!-- 分类 Tab -->
    <div class="cat-tabs" id="catTabs">
      <button data-cat="overview" class="active">📊 总览</button>
      <button data-cat="交通">🚇 交通</button>
      <button data-cat="医疗">🏥 医疗</button>
      <button data-cat="教育">🎓 教育</button>
      <button data-cat="购物">🛒 购物</button>
      <button data-cat="餐饮">🍽 餐饮</button>
      <button data-cat="生活服务">🏪 生活</button>
    </div>

    <!-- 过滤行 -->
    <div class="filter-row" id="filterRow">
      <span>显示:</span>
      <label><input type="radio" name="sourceFilter" value="all" checked onchange="applyFilter()"> 全部</label>
      <label><input type="radio" name="sourceFilter" value="osm" onchange="applyFilter()"> 🟢 OSM</label>
      <label><input type="radio" name="sourceFilter" value="google" onchange="applyFilter()"> 🔵 Google</label>
    </div>

    <!-- GM 错误面板 -->
    <div id="gmErrors" style="display:none;margin:0 12px;padding:6px 10px;background:#e9456015;border:1px solid #e9456040;border-radius:6px;font-size:11px;max-height:120px;overflow-y:auto"></div>

    <!-- 结果列表 -->
    <div class="results-scroll" id="resultsScroll">
      <div class="empty-hint"><div class="icon">📍</div>点击上方 1km / 2km / 5km 开始搜索</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== 常量 ====================
const NUS_LAT=1.2966, NUS_LNG=103.7764, NUS=[NUS_LAT,NUS_LNG];
const GM_KEY='AIzaSyA2TFWRlLOG72sJLckOBa2zWq9L-rDotzc';

const CATEGORIES={交通:["地铁站","公交站","火车站"],医疗:["医院","诊所","药店"],教育:["大学"],购物:["超市","商场","便利店"],餐饮:["餐厅","美食","快餐"],生活服务:["银行","菜市场","快递","洗衣店"]};

// Google searchNearby 用 includedTypes（结构化分类，自动去重）
// 没有对应类型的词直接跳过 Google（如"美食"=餐厅，"菜市场"=market 类型覆盖弱→跳过）
const GM_TYPES={地铁站:["subway_station"],公交站:["bus_stop","bus_station"],火车站:["train_station"],医院:["hospital"],诊所:["doctor"],药店:["pharmacy"],大学:["university"],超市:["supermarket"],商场:["shopping_mall"],便利店:["convenience_store"],餐厅:["restaurant"],美食:["restaurant"],快餐:["meal_takeaway"],银行:["bank"],菜市场:["market"],快递:["post_office"],洗衣店:["laundry"]};

const OVERPASS_Q={地铁站:`node["railway"="station"]["station"="subway"];node["station"="subway"];node["railway"="subway_entrance"];`,公交站:`node["highway"="bus_stop"];node["amenity"="bus_station"];`,火车站:`node["railway"="station"];`,医院:`node["amenity"="hospital"];way["amenity"="hospital"];`,诊所:`node["amenity"="clinic"];node["amenity"="doctors"];`,药店:`node["amenity"="pharmacy"];way["amenity"="pharmacy"];`,大学:`node["amenity"="university"];node["amenity"="college"];way["amenity"="university"];`,超市:`node["shop"~"supermarket|convenience"];way["shop"~"supermarket|convenience"];`,商场:`node["shop"="mall"];node["shop"="department_store"];way["shop"="mall"];`,便利店:`node["shop"="convenience"];`,餐厅:`node["amenity"="restaurant"];way["amenity"="restaurant"];`,美食:`node["amenity"~"restaurant|fast_food|cafe"];way["amenity"~"restaurant|fast_food|cafe"];`,快餐:`node["amenity"="fast_food"];`,银行:`node["amenity"="bank"];way["amenity"="bank"];`,菜市场:`node["amenity"="marketplace"];way["amenity"="marketplace"];`,快递:`node["amenity"="post_office"];node["shop"="shipping"];`,洗衣店:`node["shop"="laundry"];`};

const OVERPASS_EP=["https://overpass-api.de/api/interpreter","https://overpass.kumi.systems/api/interpreter","https://maps.mail.ru/osm/tools/overpass/api/interpreter"];

// ==================== 状态 ====================
let map,searchRect,currentRadius=0,currentCat='overview',running=false;
let osmR={},gmR={}; // {keyword: [{name,lat,lng,distance_m,keyword,source,vicinity,rating,place_id}]}
let osmMarkers=[],gmMarkers=[],highlightedMarker=null;
const busyEls=new Set();

function $(id){return document.getElementById(id)}

// ==================== 地图 ====================
function initMap(){
  map=L.map('map',{center:NUS,zoom:14,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.marker(NUS,{icon:L.divIcon({className:'',html:'<div style="background:#e94560;color:#fff;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:700;white-space:nowrap;box-shadow:0 2px 6px rgba(0,0,0,.4)">🎓 NUS</div>',iconAnchor:[18,12]})}).addTo(map);
}

// ==================== 工具函数 ====================
function havDistance(lat1,lng1,lat2,lng2){const R=6371000,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))}
function circleToRect(lat,lng,r){const dLat=r/111320,dLng=r/(111320*Math.cos(lat*Math.PI/180));return{low:{latitude:lat-dLat,longitude:lng-dLng},high:{latitude:lat+dLat,longitude:lng+dLng}}}
function getRect(radius){return circleToRect(NUS_LAT,NUS_LNG,radius)}

class Semaphore{constructor(limit){this.limit=limit;this.running=0;this.queue=[]}async run(fn){while(this.running>=this.limit)await new Promise(r=>this.queue.push(r));this.running++;try{return await fn()}finally{this.running--;const n=this.queue.shift();if(n)n()}}}

// ==================== Overpass 搜索 ====================
async function searchOverpass(keyword,radius){
  const q=OVERPASS_Q[keyword];if(!q)return[];
  // circle — 与 Google searchNearby 一致
  const withAround=q.replace(/;/g,`(around:${radius},${NUS_LAT},${NUS_LNG});`).replace(/\)\(/g,'(');
  const query=`[out:json][timeout:10];(${withAround});out center 100;`;
  for(const ep of OVERPASS_EP){
    try{
      const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),12000);
      const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'text/plain'},body:query,signal:ctrl.signal});
      clearTimeout(t);if(!r.ok)continue;
      const d=await r.json();const els=d.elements||[];if(!els.length)continue;
      return els.map(el=>{
        const tags=el.tags||{};
        const name=(tags['name:zh']||tags.name||tags['name:en']||tags.official_name||tags.brand||tags.operator||keyword).trim();
        const elLat=el.lat||(el.center?.lat);const elLng=el.lon||(el.center?.lon);
        if(!elLat||!elLng||!name)return null;
        return{name,lat:elLat,lng:elLng,distance_m:Math.round(havDistance(NUS_LAT,NUS_LNG,elLat,elLng)),keyword,source:'osm'};
      }).filter(Boolean);
    }catch(e){continue}
  }
  return [];
}

// ==================== Google Places 搜索（searchNearby + includedTypes）====================
async function searchGooglePlaces(cnKw,radius){
  const types=GM_TYPES[cnKw];
  if(!types||!types.length)return []; // 无对应类型 → 跳过 Google

  const all=[];let pt=null,pc=0;
  while(pc<2){ // searchNearby 每页最多 20，2 页 = 40 足以覆盖 2km
    const body={
      includedTypes:types,
      maxResultCount:20,
      locationRestriction:{circle:{center:{latitude:NUS_LAT,longitude:NUS_LNG},radius:radius}},
    };
    if(pt)body.pageToken=pt;
    try{
      const r=await fetch('https://places.googleapis.com/v1/places:searchNearby',{
        method:'POST',
        headers:{'Content-Type':'application/json','X-Goog-Api-Key':GM_KEY,'X-Goog-FieldMask':'places.displayName,places.location,places.formattedAddress,places.rating,places.id,nextPageToken'},
        body:JSON.stringify(body),
      });
      if(!r.ok){const t=await r.text();let msg=t;try{msg=JSON.parse(t).error?.message||t}catch(_){}showGmError(`${cnKw} (${types.join(',')}): HTTP ${r.status} — ${msg.substring(0,150)}`);break}
      const d=await r.json();const ps=d.places||[];pc++;
      console.log(`[GM] ${cnKw} types=${types} page ${pc}: ${ps.length} results`);
      for(const p of ps){
        const lat=p.location?.latitude,lng=p.location?.longitude;
        if(lat==null||lng==null)continue;
        all.push({name:p.displayName?.text||cnKw,lat,lng,distance_m:Math.round(havDistance(NUS_LAT,NUS_LNG,lat,lng)),keyword:cnKw,source:'google',vicinity:p.formattedAddress||'',rating:p.rating||null,place_id:p.id||''});
      }
      if(d.nextPageToken){pt=d.nextPageToken;await new Promise(r=>setTimeout(r,400))}else break;
    }catch(e){showGmError(`${cnKw}: 网络错误 — ${e.message.substring(0,100)}`);break}
  }
  return all;
}

// ==================== OSM 去重 ====================
// 对同一关键词的结果做 proximity clustering：距离 < thresholdM 视为同一设施
function dedupOsmKeyword(keyword,thresholdM){
  const pois=osmR[keyword];if(!pois||!pois.length)return;
  const sorted=[...pois].sort((a,b)=>a.distance_m-b.distance_m);
  const kept=[];
  for(const p of sorted){
    const tooClose=kept.some(k=>havDistance(p.lat,p.lng,k.lat,k.lng)<thresholdM);
    if(!tooClose)kept.push(p);
  }
  osmR[keyword]=kept;
}

// ==================== GM 错误显示 ====================
function showGmError(msg){const el=document.getElementById('gmErrors');if(el){el.style.display='block';el.innerHTML+='<div>❌ '+msg+'</div>'}console.error('[GM]',msg)}
function clearGmErrors(){const el=document.getElementById('gmErrors');if(el){el.style.display='none';el.innerHTML=''}}

// ==================== 主搜索流程 ====================
async function runTest(radius){
  if(running)return;running=true;currentRadius=radius;
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id.startsWith('btn')&&b.id!=='btnCopy')b.disabled=true});
  $('radiusLabel').textContent=`${radius/1000}km 圆形`;
  $('statusHint').innerHTML='<span class="badge loading"><span class="spinner"></span>搜索中…</span>';
  if(searchRect)map.removeLayer(searchRect);
  searchRect=L.circle(NUS,{radius,color:'#e94560',weight:2,fillColor:'#e9456033',fillOpacity:.12,dashArray:'6 3'}).addTo(map);
  map.fitBounds(searchRect.getBounds(),{padding:[30,30]});
  // 重置
  osmR={};gmR={};_poiIndex=0;for(const k of Object.keys(_poiMap))delete _poiMap[k];clearMarkers();renderResults();
  // 展开所有关键词
  const tasks=[];for(const[cat,kws]of Object.entries(CATEGORIES))for(const kw of kws)tasks.push({cat,kw});
  // OSM
  const osmStart=performance.now();
  const semOsm=new Semaphore(6);
  await Promise.all(tasks.map(({cat,kw})=>semOsm.run(()=>searchOverpass(kw,radius).then(r=>{r.forEach(o=>{o.category=cat});osmR[kw]=r;renderProgress()}))));
  const osmTime=performance.now()-osmStart;
  // Google
  const gmStart=performance.now();
  const semGm=new Semaphore(6);
  await Promise.all(tasks.map(({cat,kw})=>semGm.run(()=>searchGooglePlaces(kw,radius).then(r=>{r.forEach(o=>{o.category=cat});gmR[kw]=r;renderProgress()}))));
  const gmTime=performance.now()-gmStart;
  // ── OSM 去重：地铁站入口/公交站 proximity dedup ──
  dedupOsmKeyword("地铁站",150);
  dedupOsmKeyword("公交站",80);
  dedupOsmKeyword("火车站",200);

  // 完成
  running=false;
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy')b.disabled=false});
  $('btnCopy').disabled=false;
  $('statusHint').innerHTML=`<span class="badge done">✓ OSM ${osmTime.toFixed(0)}ms · Google ${gmTime.toFixed(0)}ms</span>`;
  lastOsmTime=osmTime;lastGmTime=gmTime;
  renderResults();
}

let lastOsmTime=0,lastGmTime=0;

function renderProgress(){
  // 搜索中实时更新总览数字
  if(!currentRadius)return;
  const osmTotal=Object.values(osmR).flat().length;
  const gmTotal=Object.values(gmR).flat().length;
  $('statusHint').innerHTML=`<span class="badge loading"><span class="spinner"></span>OSM ${osmTotal} · Google ${gmTotal}</span>`;
}

// ==================== 地图标记 ====================
function clearMarkers(){osmMarkers.forEach(m=>map.removeLayer(m));gmMarkers.forEach(m=>map.removeLayer(m));osmMarkers=[];gmMarkers=[];if(highlightedMarker){map.removeLayer(highlightedMarker);highlightedMarker=null}}

const osmIcon=L.divIcon({className:'',html:'<div style="width:7px;height:7px;border-radius:50%;background:#7ebc89;border:1px solid rgba(255,255,255,.6)"></div>',iconSize:[7,7],iconAnchor:[3,3]});
const gmIcon=L.divIcon({className:'',html:'<div style="width:7px;height:7px;border-radius:50%;background:#4285f4;border:1px solid rgba(255,255,255,.6)"></div>',iconSize:[7,7],iconAnchor:[3,3]});
const hlIcon=L.divIcon({className:'',html:'<div style="width:14px;height:14px;border-radius:50%;background:#e94560;border:3px solid #fff;box-shadow:0 0 8px rgba(233,69,96,.6);animation:pulse .8s infinite"></div>',iconSize:[14,14],iconAnchor:[7,7]});

function addMarkersForFilter(){
  clearMarkers();
  const filter=document.querySelector('input[name="sourceFilter"]:checked')?.value||'all';
  const pois=getFilteredPois();

  for(const p of pois){
    if(filter==='all'||filter===p.source){
      const icon=p.source==='osm'?osmIcon:gmIcon;
      const m=L.marker([p.lat,p.lng],{icon}).bindTooltip(`<b>${p.name}</b><br>${p.keyword} · ${p.distance_m}m<br><small>${p.source==='osm'?'🟢 OSM':'🔵 Google'}${p.vicinity?' · '+p.vicinity:''}${p.rating?' · ⭐'+p.rating:''}</small>`,{direction:'top'});
      m._poiData=p;m.addTo(map);
      if(p.source==='osm')osmMarkers.push(m);else gmMarkers.push(m);
    }
  }
}

function getFilteredPois(){
  if(currentCat==='overview')return Object.values(osmR).flat().concat(Object.values(gmR).flat());
  const pois=[];
  const kws=CATEGORIES[currentCat]||[];
  for(const kw of kws){if(osmR[kw])pois.push(...osmR[kw]);if(gmR[kw])pois.push(...gmR[kw])}
  return pois;
}

function applyFilter(){renderResults();addMarkersForFilter();highlightPoiInList(null)}

function highlightPoiInList(poi){
  document.querySelectorAll('.poi-item.highlight').forEach(el=>el.classList.remove('highlight'));
  if(!poi)return;
  // 通过 _poiMap 反向查找
  for(const[id,p]of Object.entries(_poiMap)){
    if(p===poi){
      const el=document.querySelector(`.poi-item[data-poi-id="${id}"]`);
      if(el)el.classList.add('highlight');
      // 展开所属折叠组
      const kwBody=el.closest('.kw-body');
      if(kwBody&&!kwBody.classList.contains('open')){
        kwBody.classList.add('open');
        kwBody.previousElementSibling?.classList.add('open');
      }
      el.scrollIntoView({behavior:'smooth',block:'center'});
      break;
    }
  }
}

function flyToPoi(poi){
  highlightPoiInList(poi);
  if(highlightedMarker)map.removeLayer(highlightedMarker);
  highlightedMarker=L.marker([poi.lat,poi.lng],{icon:hlIcon}).addTo(map).bindPopup(`<b>${poi.name}</b><br>${poi.keyword} · ${poi.distance_m}m<br><small>${poi.source==='osm'?'🟢 OSM':'🔵 Google'}${poi.vicinity?' · '+poi.vicinity:''}</small>`).openPopup();
  map.flyTo([poi.lat,poi.lng],17,{duration:.5});
}

// ==================== 渲染结果列表 ====================
function renderResults(){
  const scroll=$('resultsScroll');
  const cat=currentCat;
  const filter=document.querySelector('input[name="sourceFilter"]:checked')?.value||'all';

  if(!Object.keys(osmR).length&&!Object.keys(gmR).length){
    scroll.innerHTML='<div class="empty-hint"><div class="icon">📍</div>点击上方 1km / 2km / 5km 开始搜索</div>';
    return;
  }

  if(cat==='overview'){
    // 总览表格
    let h='<div style="font-size:12px;color:#aaa;margin-bottom:8px">📊 分类总览</div>';
    h+='<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="color:#888;font-size:10px;text-transform:uppercase"><th style="text-align:left;padding:4px 6px">分类</th><th style="padding:4px 6px">OSM</th><th style="padding:4px 6px">Google</th><th style="padding:4px 6px">重叠</th></tr></thead><tbody>';
    let tOsm=0,tGm=0,tOl=0;
    for(const[catName,kws]of Object.entries(CATEGORIES)){
      const o=kws.reduce((s,kw)=>s+(osmR[kw]?.length||0),0);
      const g=kws.reduce((s,kw)=>s+(gmR[kw]?.length||0),0);
      const oAll=kws.flatMap(kw=>osmR[kw]||[]),gAll=kws.flatMap(kw=>gmR[kw]||[]);
      const gNames=new Set(gAll.map(p=>p.name.toLowerCase().trim()));
      let ol=0;for(const p of oAll){const n=p.name.toLowerCase().trim();if(gNames.has(n)){ol++;continue}for(const gn of gNames){if(n.includes(gn)||gn.includes(n)){ol++;break}}}
      tOsm+=o;tGm+=g;tOl+=ol;
      h+=`<tr style="cursor:pointer" onclick="switchTab('${catName}')"><td style="padding:5px 6px;font-weight:600">${catName}</td><td style="padding:5px 6px;text-align:center;color:#7ebc89;font-weight:600">${o}</td><td style="padding:5px 6px;text-align:center;color:#4285f4;font-weight:600">${g}</td><td style="padding:5px 6px;text-align:center;color:#e9a23b">${ol}</td></tr>`;
    }
    h+=`<tr style="border-top:1px solid #0f3460"><td style="padding:5px 6px;font-weight:700">合计</td><td style="padding:5px 6px;text-align:center;color:#7ebc89;font-weight:700">${tOsm}</td><td style="padding:5px 6px;text-align:center;color:#4285f4;font-weight:700">${tGm}</td><td style="padding:5px 6px;text-align:center;color:#e9a23b;font-weight:700">${tOl}</td></tr>`;
    h+='</tbody></table>';

    // 耗时
    if(lastOsmTime||lastGmTime){
      h+=`<div style="margin-top:12px;padding:8px;background:#1a1a2e;border-radius:6px;font-size:11px;color:#aaa">
        ⏱ OSM Overpass: <b style="color:#7ebc89">${lastOsmTime.toFixed(0)}ms</b> · Google Places: <b style="color:#4285f4">${lastGmTime.toFixed(0)}ms</b>
        ${lastOsmTime&&lastGmTime?` · 差异: <b>${lastOsmTime<lastGmTime?'OSM 快 '+(lastGmTime-lastOsmTime).toFixed(0):'Google 快 '+(lastOsmTime-lastGmTime).toFixed(0)}ms</b>`:''}
      </div>`;
    }
    // GM 关键词对照
    h+='<div style="margin-top:10px;padding:8px;background:#1a1a2e;border-radius:6px;font-size:11px;color:#888;line-height:1.6"><b style="color:#aaa">🔤 Google searchNearby includedTypes 对照</b><br>';
    for(const[kw,types]of Object.entries(GM_TYPES))h+=`<span style="color:#ccc">${kw}</span> → <span style="color:#4285f4">${types.join(', ')}</span> &nbsp;`;
    h+='</div>';
    scroll.innerHTML=h;
  }else{
    // 具体分类
    const kws=CATEGORIES[cat]||[];
    let h='';
    for(const kw of kws){
      const oPo=osmR[kw]||[],gPo=gmR[kw]||[];
      if(!oPo.length&&!gPo.length)continue;
      const oLen=oPo.length,gLen=gPo.length;
      h+=`<div class="kw-group"><div class="kw-header open" onclick="toggleKw(this)"><span class="arrow">▶</span><span class="kw-name">${kw}</span><span class="counts"><span class="c-osm">🟢 ${oLen}</span> <span class="c-gm">🔵 ${gLen}</span></span></div><div class="kw-body open">`;
      // OSM
      if(oLen&&filter!=='google'){
        h+=`<div class="source-label">OSM (${oLen})</div>`;
        for(const p of oPo.slice(0,50))h+=poiItemHTML(p);
        if(oLen>50)h+=`<div style="color:#888;font-size:10px;padding:2px 8px">… 还有 ${oLen-50} 个</div>`;
      }
      // Google
      if(gLen&&filter!=='osm'){
        h+=`<div class="source-label">Google (${gLen})</div>`;
        for(const p of gPo.slice(0,50))h+=poiItemHTML(p);
        if(gLen>50)h+=`<div style="color:#888;font-size:10px;padding:2px 8px">… 还有 ${gLen-50} 个</div>`;
      }
      h+='</div></div>';
    }
    if(!h)h='<div class="empty-hint">该分类下无搜索结果</div>';
    scroll.innerHTML=h;
  }

  // 地图标记
  addMarkersForFilter();
}

// POI 数据索引（用于点击查找）
let _poiIndex=0;
const _poiMap={};
function poiItemHTML(p){
  const id='poi_'+(_poiIndex++);
  _poiMap[id]=p;
  const cls=p.source==='osm'?'osm':'gm';
  return `<div class="poi-item" data-poi-id="${id}"><span class="dot ${cls}"></span><span class="poi-name">${p.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}</span><span class="poi-dist">${p.distance_m}m</span></div>`;
}

// 事件委托（脚本在 body 底部，DOM 已就绪）
document.getElementById('resultsScroll').addEventListener('click',e=>{
  const item=e.target.closest('.poi-item');
  if(!item)return;
  const id=item.dataset.poiId;
  const poi=_poiMap[id];
  if(poi)flyToPoi(poi);
});

function toggleKw(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('open')}

// ==================== Tab 切换 ====================
function switchTab(cat){
  currentCat=cat;
  document.querySelectorAll('#catTabs button').forEach(b=>b.classList.toggle('active',b.dataset.cat===cat));
  renderResults();
  addMarkersForFilter();
}
// 初始化 tab 事件
document.getElementById('catTabs').addEventListener('click',e=>{if(e.target.tagName==='BUTTON')switchTab(e.target.dataset.cat)});

// ==================== 报告 ====================
function copyReport(){
  let r=[];r.push('═══════════════════════════════════');r.push('  POI 周边搜索对比测试报告');r.push('═══════════════════════════════════');r.push('');r.push(`测试位置: NUS (${NUS_LAT}, ${NUS_LNG})`);r.push(`搜索范围: ${currentRadius?currentRadius/1000+'km 圆形（searchNearby circle + Overpass around）':'N/A'}`);r.push(`测试时间: ${new Date().toLocaleString('zh-CN')}`);r.push('');r.push('── 搜索耗时 ──');r.push(`  OSM (Overpass): ${lastOsmTime.toFixed(0)}ms`);r.push(`  Google (searchNearby): ${lastGmTime.toFixed(0)}ms`);r.push('');r.push('── Google includedTypes 对照 ──');
  for(const[kw,types]of Object.entries(GM_TYPES))r.push(`  ${kw} → ${types.join(', ')}`);
  r.push('');r.push('── 分类对比 ──');r.push('  分类 | OSM | Google');
  for(const[cat,kws]of Object.entries(CATEGORIES)){const o=kws.reduce((s,kw)=>s+(osmR[kw]?.length||0),0);const g=kws.reduce((s,kw)=>s+(gmR[kw]?.length||0),0);r.push(`  ${cat} | ${o} | ${g}`)}
  r.push('');r.push('── 关键词明细 ──');
  for(const[cat,kws]of Object.entries(CATEGORIES))for(const kw of kws){const o=(osmR[kw]||[]).length,g=(gmR[kw]||[]).length;const types=(GM_TYPES[kw]||[]).join(',')||'(无对应类型)';r.push(`  ${cat}·${kw} | OSM:${o} | Google(${types}):${g}`)}
  r.push('');r.push('═══════════════════════════════════');
  const txt=r.join('\n');
  navigator.clipboard.writeText(txt).then(()=>{const h=$('statusHint');h.innerHTML='<span class="badge done">✅ 报告已复制！</span>';setTimeout(()=>{h.innerHTML=`<span class="badge done">✓ OSM ${lastOsmTime.toFixed(0)}ms · Google ${lastGmTime.toFixed(0)}ms</span>`},3000)}).catch(()=>{const ta=document.createElement('textarea');ta.value=txt;ta.style.cssText='position:fixed;left:-9999px';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)});
}

function resetAll(){
  running=false;osmR={};gmR={};lastOsmTime=0;lastGmTime=0;currentRadius=0;
  clearMarkers();clearGmErrors();
  if(searchRect){map.removeLayer(searchRect);searchRect=null}
  $('radiusLabel').textContent='—';
  currentCat='overview';
  document.querySelectorAll('#catTabs button').forEach(b=>b.classList.toggle('active',b.dataset.cat==='overview'));
  document.querySelector('input[name="sourceFilter"][value="all"]').checked=true;
  $('resultsScroll').innerHTML='<div class="empty-hint"><div class="icon">📍</div>点击上方 1km / 2km / 5km 开始搜索</div>';
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy')b.disabled=false});
  $('btnCopy').disabled=true;
  $('statusHint').innerHTML='<span class="badge waiting">就绪</span>';
  map.setView(NUS,14);
}

// ==================== 启动 ====================
initMap();
window.initMap=function(){
  document.querySelectorAll('.toolbar button[id^="btn"]').forEach(b=>{if(b.id!=='btnCopy')b.disabled=false});
  $('statusHint').innerHTML='<span class="badge waiting">就绪 — 选择搜索半径</span>';
};
window.gm_authFailure=function(){$('statusHint').innerHTML='<span class="badge error">❌ Google API Key 无效</span>'};
(function(){const s=document.createElement('script');s.src=`https://maps.googleapis.com/maps/api/js?key=${GM_KEY}&callback=initMap`;s.async=true;s.defer=true;s.onerror=()=>{$('statusHint').innerHTML='<span class="badge error">❌ 无法加载 Google Maps API</span>'};document.head.appendChild(s)})();
</script>
