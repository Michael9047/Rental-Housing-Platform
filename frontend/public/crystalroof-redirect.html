<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>查看 CrystalRoof 评分</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      max-width: 400px;
    }
    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 24px;
      margin-bottom: 12px;
    }
    .description {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .postcode-card {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .postcode-label {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
    }
    .postcode-value {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 2px;
      word-break: break-all;
    }
    .copy-btn {
      margin-top: 12px;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.3);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.4);
    }
    .copy-btn.copied {
      background: #67c23a;
      border-color: #67c23a;
    }
    .action-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s;
      margin-bottom: 12px;
    }
    .action-btn:hover {
      transform: translateY(-2px);
    }
    .action-btn:active {
      transform: translateY(0);
    }
    .action-btn.secondary {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .steps {
      text-align: left;
      font-size: 14px;
      opacity: 0.8;
      margin-top: 24px;
      padding-left: 20px;
    }
    .steps li {
      margin-bottom: 8px;
    }
    .arrow {
      font-size: 20px;
      margin-left: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🔍</div>
    <div class="title">CrystalRoof 评分查询</div>
    <div class="description">
      CrystalRoof 是英国权威的街区数据分析平台，提供犯罪率、学校、交通等多维度评分。
    </div>
    
    <div class="postcode-card">
      <div class="postcode-label">目标邮编</div>
      <div class="postcode-value" id="postcodeDisplay"></div>
      <button class="copy-btn" id="copyBtn">复制邮编</button>
    </div>
    
    <button class="action-btn" id="openCrystalRoofBtn">
      打开 CrystalRoof 官网查询 <span class="arrow">→</span>
    </button>
    
    <button class="action-btn secondary" id="goBackBtn">
      返回房源详情页
    </button>
    
    <ol class="steps">
      <li>点击上方按钮打开 CrystalRoof 官网</li>
      <li>在搜索框中粘贴或输入邮编</li>
      <li>查看犯罪率、学校、交通等评分详情</li>
    </ol>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const postcode = urlParams.get('postcode') || '';
    const address = urlParams.get('address') || '';
    
    document.getElementById('postcodeDisplay').textContent = postcode || '未指定';
    
    document.getElementById('copyBtn').addEventListener('click', () => {
      if (postcode) {
        navigator.clipboard.writeText(postcode).then(() => {
          const btn = document.getElementById('copyBtn');
          btn.textContent = '已复制！';
          btn.classList.add('copied');
          setTimeout(() => {
            btn.textContent = '复制邮编';
            btn.classList.remove('copied');
          }, 2000);
        });
      }
    });
    
    document.getElementById('openCrystalRoofBtn').addEventListener('click', () => {
      window.open('https://crystalroof.co.uk/', '_blank');
    });
    
    document.getElementById('goBackBtn').addEventListener('click', () => {
      window.history.back();
    });
  </script>
</body>
</html>
