<h2 style="margin:0 0 16px;color:#16a34a;font-size:20px;">预订已确认 - 支付成功</h2>

<p style="margin:0 0 12px;color:#475569;font-size:15px;line-height:1.7;">
您好，{tenant_name}：
</p>

<p style="margin:0 0 12px;color:#475569;font-size:15px;line-height:1.7;">
您的租房预订已确认，支付已成功完成。以下是订单详情：
</p>

<!-- Detail Card -->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:20px;margin-bottom:24px;">
<tr><td style="padding:8px 0;">
<p style="margin:0 0 8px;color:#166534;font-size:14px;"><strong>订单编号：</strong>{order_number}</p>
<p style="margin:0 0 8px;color:#166534;font-size:14px;"><strong>房源名称：</strong>{property_name}</p>
<p style="margin:0 0 8px;color:#166534;font-size:14px;"><strong>房源城市：</strong>{property_city}</p>
<p style="margin:0 0 8px;color:#166534;font-size:14px;"><strong>入住日期：</strong>{lease_start_date}</p>
<p style="margin:0 0 8px;color:#166534;font-size:14px;"><strong>租期：</strong>{lease_months}个月</p>
<p style="margin:0 0 8px;color:#166534;font-size:14px;"><strong>已支付金额：</strong>{settlement_amount} {settlement_currency}</p>
<p style="margin:0;color:#166534;font-size:14px;"><strong>支付时间：</strong>{payment_time}</p>
</td></tr>
</table>

<!-- CTA Button -->
<table cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
<tr>
<td style="background:#16a34a;border-radius:8px;text-align:center;">
<a href="{secure_order_url}" style="display:inline-block;padding:12px 32px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">查看订单详情</a>
</td>
</tr>
</table>

<p style="margin:0;color:#94a3b8;font-size:13px;">
此邮件由系统自动发送，请勿直接回复。
</p>
