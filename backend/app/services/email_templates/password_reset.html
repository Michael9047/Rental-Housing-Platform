<h2 style="margin:0 0 16px;color:#1e293b;font-size:20px;">密码重置</h2>

<p style="margin:0 0 12px;color:#475569;font-size:15px;line-height:1.7;">
您好，{user_name}：
</p>

<p style="margin:0 0 24px;color:#475569;font-size:15px;line-height:1.7;">
我们收到了您的密码重置请求。点击下方按钮即可重置密码（有效期 {expire_minutes} 分钟）：
</p>

<!-- CTA Button -->
<table cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
<tr>
<td style="background:#2563eb;border-radius:8px;text-align:center;">
<a href="{reset_link}" style="display:inline-block;padding:12px 32px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">重置密码</a>
</td>
</tr>
</table>

<p style="margin:0 0 12px;color:#94a3b8;font-size:13px;">
如果按钮无法点击，请复制以下链接到浏览器打开：<br>
<a href="{reset_link}" style="color:#2563eb;">{reset_link}</a>
</p>

<p style="margin:0;color:#ef4444;font-size:13px;">
如果您没有请求重置密码，请忽略此邮件，您的账户安全不受影响。
</p>
