<h2 style="margin:0 0 16px;color:#1e293b;font-size:20px;">支付已发起</h2>

<p style="margin:0 0 12px;color:#475569;font-size:15px;line-height:1.7;">
您好，{user_name}：
</p>

<p style="margin:0 0 24px;color:#475569;font-size:15px;line-height:1.7;">
您的支付已成功发起，请尽快完成付款。
</p>

<!-- Detail Card -->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:20px;margin-bottom:24px;">
<tr><td style="padding:8px 0;">
<p style="margin:0 0 8px;color:#64748b;font-size:14px;"><strong>预约编号：</strong>#{booking_id}</p>
<p style="margin:0 0 8px;color:#64748b;font-size:14px;"><strong>支付金额：</strong>¥{amount}</p>
<p style="margin:0 0 8px;color:#64748b;font-size:14px;"><strong>支付编号：</strong>{payment_id}</p>
<p style="margin:0;color:#64748b;font-size:14px;"><strong>支付方式：</strong>微信支付</p>
</td></tr>
</table>

<p style="margin:0 0 12px;color:#f59e0b;font-size:14px;">
⚠ 请在 2 小时内完成支付，逾期订单将自动关闭。
</p>

<!-- CTA Button -->
<table cellpadding="0" cellspacing="0" style="margin-bottom:24px;">
<tr>
<td style="background:#2563eb;border-radius:8px;text-align:center;">
<a href="{frontend_url}/booking/payment/{payment_id}" style="display:inline-block;padding:12px 32px;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;">前往支付</a>
</td>
</tr>
</table>
