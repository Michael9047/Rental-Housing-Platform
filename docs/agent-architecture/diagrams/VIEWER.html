<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent 架构图浏览器</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script>mermaid.initialize({startOnLoad:false,theme:'default',securityLevel:'loose'});</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;display:flex;height:100vh;overflow:hidden;background:#1a1a2e}
#sidebar{width:270px;min-width:270px;background:#16213e;color:#eee;display:flex;flex-direction:column;overflow:hidden}
#sidebar h1{padding:16px;font-size:16px;border-bottom:1px solid #0f3460}
#sidebar ul{list-style:none;overflow-y:auto;flex:1}
#sidebar li{padding:8px 16px;cursor:pointer;font-size:13px;border-bottom:1px solid #1a1a3e;transition:background .15s}
#sidebar li:hover{background:#0f3460}
#sidebar li.active{background:#e94560;font-weight:600}
#sidebar .group{padding:10px 16px 4px;font-size:11px;text-transform:uppercase;color:#888;letter-spacing:.05em}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#16213e;border-bottom:1px solid #0f3460}
#toolbar button{padding:6px 14px;border:1px solid #0f3460;border-radius:6px;background:#1a1a2e;color:#ccc;cursor:pointer;font-size:12px;transition:all .15s}
#toolbar button:hover{background:#e94560;border-color:#e94560;color:#fff}
#zoom-level{font-size:12px;color:#999;min-width:50px;text-align:center}
#hint{font-size:11px;color:#666;margin-left:auto}
#canvas{flex:1;overflow:hidden;position:relative;cursor:grab;background:#fff;display:flex;justify-content:center;align-items:center}
#canvas.dark{background:#1e1e2e}
#diagram-container{transform-origin:center center;pointer-events:none}
#diagram-container svg{max-width:none!important;pointer-events:auto}
</style>
</head>
<body>
<nav id="sidebar">
  <h1>📐 Agent 架构图<br><small style="color:#888;font-weight:400">19 张 · 点击切换</small></h1>
  <ul id="nav-list"></ul>
</nav>
<div id="main">
  <div id="toolbar">
    <button onclick="zoomIn()">🔍 放大</button>
    <button onclick="zoomOut()">🔍 缩小</button>
    <button onclick="zoomFit()">📐 适合窗口</button>
    <button onclick="zoomReset()">1:1</button>
    <span id="zoom-level">100%</span>
    <span id="hint">🖱 Ctrl+滚轮缩放 · 拖拽平移</span>
  </div>
  <div id="canvas">
    <div id="diagram-container"></div>
  </div>
</div>
<script>
const DIAGRAMS = [
  {
    "group": "对比 Agent",

  },
  {
    "group": "对比 Agent",
    "title": "对比维度详解",
    "source": "graph LR\n    subgraph Hard[\"硬指标 (确定性打分)\"]\n        H1[\"💰 总拥有成本<br/>──────<br/>月租金<br/>押金 (几周?)<br/>中介费<br/>水电网估算<br/>管理费/物业费<br/>──────<br/>数据: Property\"]\n        H2[\"🚌 通勤<br/>──────<br/>公交: 时间+换乘<br/>骑车: 时间<br/>开车: 时间<br/>步行: ≤15min 加分<br/>──────<br/>数据: 路由 API\"]\n        H3[\"📐 空间<br/>──────<br/>总面积<br/>卧室数<br/>是否有独卫<br/>储物空间<br/>人均面积<br/>──────<br/>数据: Property\"]\n        H4[\"🏪 周边配套<br/>──────<br/>超市 (距离+数量)<br/>餐厅 (类型+评分)<br/>医院/诊所<br/>药店<br/>健身房<br/>──────<br/>数据: PropertyPOI\"]\n    end\n\n    subgraph Soft[\"软指标 (数据辅助 + LLM 判断)\"]\n        S1[\"🛡️ 安全<br/>──────<br/>暴力犯罪率<br/>入室盗窃率<br/>vs 城市均值<br/>vs 对比组均值<br/>──────<br/>数据: Police.uk / data.gov.sg\"]\n        S2[\"🏠 房屋品质<br/>──────<br/>装修水平<br/>朝向/采光<br/>楼层<br/>隔音<br/>建筑年代<br/>──────<br/>数据: Property 描述 + Review\"]\n        S3[\"👤 房东口碑<br/>──────<br/>响应速度<br/>维修效率<br/>是否乱扣押金<br/>沟通语言<br/>──────<br/>数据: Review 聚合\"]\n    end\n\n    Hard --> ScoringEngine[\"确定性打分引擎<br/>每维度 0-100\"]\n    Soft --> ScoringEngine\n    ScoringEngine --> WeightedSum[\"用户权重加权<br/>balanced / budget / commute / safety / space\"]"
  },

  },
  {
    "group": "数据流",
    "title": "Cart: 两个 Agent 的桥梁",
    "source": "graph TB\n    subgraph Sources[\"备选清单来源\"]\n        DA_Cart[\"🤖 发现 Agent 对话中<br/>用户说 '加入备选'\"]\n        Search_Cart[\"🔍 手动检索页<br/>勾选房源 → 加入备选\"]\n        Fav_Cart[\"⭐ 收藏夹<br/>一键转入备选\"]\n    end\n\n    subgraph CartDB[\"AgentCart (PostgreSQL)\"]\n        Cart[\"agent_carts<br/>user_id · session_id\"]\n        CartItems[\"agent_cart_items<br/>cart_id · property_id · added_reason · added_at\"]\n    end\n\n    subgraph Consumers[\"备选清单消费者\"]\n        CA_Read[\"⚖️ 对比 Agent<br/>读取 → 深度对比\"]\n        DA_Read[\"🤖 发现 Agent<br/>读取 → 展示清单状态\"]\n        CompareView[\"📊 对比页面<br/>展示备选列表\"]\n    end\n\n    DA_Cart -->|\"POST /agent/sessions/{id}/messages<br/>{message: '加入备选'}\"| Cart\n    Search_Cart -->|\"POST /agent/cart/items\"| Cart\n    Fav_Cart -->|\"POST /agent/cart/items\"| Cart\n\n    Cart --> CartItems\n\n    CartItems --> CA_Read\n    CartItems --> DA_Read\n    CartItems --> CompareView\n\n    style Cart fill:#e8a838,color:#fff\n    style CartItems fill:#e8a838,color:#fff"

  },
  {
    "group": "数据流",
    "title": "Cart 数据模型",
    "source": "erDiagram\n    AgentCart {\n        int id PK\n        int user_id FK \"唯一，一个用户一个 Cart\"\n        int latest_session_id FK \"关联最近对话 session\"\n        datetime created_at\n        datetime updated_at\n    }\n\n    AgentCartItem {\n        int id PK\n        int cart_id FK\n        int property_id FK\n        string added_reason \"agent_recommend | manual_search | favorites\"\n        datetime added_at\n    }\n\n    Property {\n        int id PK\n        string title\n        decimal price\n        float area\n        int bedrooms\n        string district\n        json description\n    }\n\n    AgentCart ||--o{ AgentCartItem : contains\n    AgentCartItem }o--|| Property : references"
  },
  {
    "group": "数据流",

  },
  {
    "group": "数据流",

  },
  {

    "source": "graph TD\n    Start([\"用户消息到达\"]) --> LoadHistory[\"加载会话历史 (最近 10 条)\"]\n    LoadHistory --> ParseRefs[\"解析显式房源 ID (如 '房源 12')\"]\n    ParseRefs --> StageClassify[\"漏斗阶段分类<br/>LLM: explore / calibrate / narrow / compare / decide\"]\n    StageClassify --> FAQMatch[\"FAQ 规则匹配<br/>strong / weak / none\"]\n    FAQMatch --> HeuristicIntent[\"启发式意图识别<br/>(规则兜底)\"]\n    HeuristicIntent --> LLMIntent{\"LLM 意图分类\"}\n    \n    LLMIntent -->|\"faq (strong)\"| FAQDirect[\"直接 FAQ 回答<br/>+ 快捷选项 + 深度链接\"]\n    LLMIntent -->|\"faq (weak)\"| FAQConfirm[\"反问确认<br/>+ 选项按钮\"]\n    LLMIntent -->|\"recommend\"| Recommend[\"推荐管线<br/>⚠️ 核心流程\"]\n    LLMIntent -->|\"add_to_cart\"| AddCart[\"解析引用 → 加入 Cart\"]\n    LLMIntent -->|\"remove_from_cart\"| RemoveCart[\"解析引用 → 移除出 Cart\"]\n    LLMIntent -->|\"compare_cart\"| TriggerCompare[\"提示用户进入对比 Agent\"]\n    LLMIntent -->|\"general\"| GeneralChat[\"LLM 文本回复<br/>(最多 120 tokens)\"]\n\n    FAQDirect --> Persist\n    FAQConfirm --> Persist\n    Recommend --> Persist\n    AddCart --> Persist\n    RemoveCart --> Persist\n    TriggerCompare --> Persist\n    GeneralChat --> Persist\n\n    Persist[\"持久化消息到 DB\"] --> Return([\"返回响应\"])\n\n    style Recommend fill:#4a90d9,color:#fff\n    style TriggerCompare fill:#e8a838,color:#fff"
  },
  {

let scale = 1, offsetX = 0, offsetY = 0, currentIdx = 0;
let panning = false, panStartX = 0, panStartY = 0, panOrigX = 0, panOrigY = 0;

const nav = document.getElementById('nav-list');
const container = document.getElementById('diagram-container');
const zoomLabel = document.getElementById('zoom-level');
const canvasEl = document.getElementById('canvas');

let lastGroup = '';
DIAGRAMS.forEach((d, i) => {
  if (d.group !== lastGroup) {
    nav.innerHTML += '<li class="group">' + d.group + '</li>';
    lastGroup = d.group;
  }
  nav.innerHTML += '<li data-idx="' + i + '">' + d.title + '</li>';
});

function applyTransform() {
  container.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
  zoomLabel.textContent = Math.round(scale * 100) + '%';
}

async function loadDiagram(idx) {
  currentIdx = idx;
  scale = 1; offsetX = 0; offsetY = 0;
  applyTransform();
  try {
    const { svg } = await mermaid.render('mermaid-svg-' + idx, DIAGRAMS[idx].source);
    container.innerHTML = svg;
    applyTransform();
  } catch(e) {
    container.innerHTML = '<pre style="color:red;padding:20px;white-space:pre-wrap">Render Error:\n' + e.message + '\n\nSource:\n' + DIAGRAMS[idx].source + '</pre>';
  }
  document.querySelectorAll('#nav-list li:not(.group)').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

function zoomIn()  { scale = Math.min(scale * 1.3, 5); applyTransform(); }
function zoomOut() { scale = Math.max(scale / 1.3, 0.15); applyTransform(); }
function zoomFit() { scale = 1; offsetX = 0; offsetY = 0; applyTransform(); }
function zoomReset() { scale = 1; applyTransform(); }

canvasEl.addEventListener('wheel', (e) => {
  if (e.ctrlKey) {
    e.preventDefault();
    scale = Math.max(0.15, Math.min(5, scale * (e.deltaY > 0 ? 0.9 : 1.1)));
    applyTransform();
  }
}, { passive: false });

// Pan: click + drag
canvasEl.addEventListener('mousedown', (e) => {
  if (e.target.tagName === 'BUTTON') return;
  panning = true;
  panStartX = e.clientX; panStartY = e.clientY;
  panOrigX = offsetX; panOrigY = offsetY;
  canvasEl.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', (e) => {
  if (!panning) return;
  offsetX = panOrigX + (e.clientX - panStartX);
  offsetY = panOrigY + (e.clientY - panStartY);
  applyTransform();
});
window.addEventListener('mouseup', () => {
  panning = false;
  canvasEl.style.cursor = 'grab';
});

// Touch pan
canvasEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    panning = true;
    panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
    panOrigX = offsetX; panOrigY = offsetY;
  }
}, { passive: false });
window.addEventListener('touchmove', (e) => {
  if (!panning || e.touches.length !== 1) return;
  e.preventDefault();
  offsetX = panOrigX + (e.touches[0].clientX - panStartX);
  offsetY = panOrigY + (e.touches[0].clientY - panStartY);
  applyTransform();
}, { passive: false });
window.addEventListener('touchend', () => { panning = false; });

nav.addEventListener('click', (e) => {
  const li = e.target.closest('li:not(.group)');
  if (!li) return;
  loadDiagram(parseInt(li.dataset.idx));
});

window.addEventListener('keydown', (e) => {
  if (e.key === '+' || e.key === '=') zoomIn();
  if (e.key === '-') zoomOut();
  if (e.key === '0') zoomFit();
  if (e.key === 'ArrowDown' || e.key === 'j') { e.preventDefault(); loadDiagram(Math.min(currentIdx + 1, DIAGRAMS.length - 1)); }
  if (e.key === 'ArrowUp' || e.key === 'k') { e.preventDefault(); loadDiagram(Math.max(currentIdx - 1, 0)); }
});

loadDiagram(0);
</script>
