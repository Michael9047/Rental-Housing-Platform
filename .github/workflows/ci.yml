name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  # ---- Backend Lint & Type Check ----
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ruff mypy types-passlib types-PyJWT types-redis
          pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Mypy type check
        run: mypy app/ --ignore-missing-imports --no-strict-optional

  # ---- Backend Tests ----
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: rental_housing_test
          POSTGRES_USER: rental
          POSTGRES_PASSWORD: rental
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rental -d rental_housing_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://rental:rental@localhost:5432/rental_housing_test
          ALEMBIC_DATABASE_URL: postgresql+psycopg://rental:rental@localhost:5432/rental_housing_test
          REDIS_URL: redis://localhost:6379/0
          AUTH_SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: ci
          DEBUG: "false"
        run: pytest tests/ -v --tb=short

  # ---- Frontend Build Check ----
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

  # ---- Docker Build & Push ----
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-24.04
    needs: [backend-lint, backend-tests, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/frontend:latest
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
