name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

env:
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-24.04
    environment:
      name: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          docker build -t $REGISTRY/${{ github.repository }}/backend:${{ steps.tag.outputs.tag }} ./backend
          docker build -t $REGISTRY/${{ github.repository }}/frontend:${{ steps.tag.outputs.tag }} ./frontend
          docker push $REGISTRY/${{ github.repository }}/backend:${{ steps.tag.outputs.tag }}
          docker push $REGISTRY/${{ github.repository }}/frontend:${{ steps.tag.outputs.tag }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            cd /opt/rental-housing
            docker compose -f docker-compose.prod.yml pull

            # Run database migrations before restart
            docker compose -f docker-compose.prod.yml run --rm backend \
              alembic -c alembic.ini upgrade head

            # Restart services
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Prune old images
            docker image prune -af --filter "until=24h"

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ secrets.DEPLOY_DOMAIN }}/api/v1/health" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Attempt $i/12: HTTP $STATUS — retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 12 attempts."
          exit 1
